---
- name: Garantir path do profile alvo
  ansible.builtin.set_fact:
    _target_profile: "{{ _target_profile | default('/' ~ _profile_partition ~ '/' ~ _profile_name) }}"
  changed_when: false

- name: Garantir tipo do profile alvo
  ansible.builtin.set_fact:
    _target_profile_type: >-
      {{
        (_target_profile_type | default('') | string | trim | lower)
        if (_target_profile_type | default('') | string | trim | length) > 0
        else ((f5_profile_type_by_path | default({})).get(_target_profile, 'client'))
      }}
  changed_when: false

- name: Buscar detalhes do Client SSL Profile alvo
  ansible.builtin.uri:
    url: >-
      https://{{ _f5_srv }}:{{ _f5_port }}/mgmt/tm/ltm/profile/client-ssl/~{{ _profile_partition }}~{{ _profile_name }}?$select=certKeyChain
    method: GET
    user: "{{ f5_user }}"
    password: "{{ f5_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs | bool }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _client_prof_raw
  changed_when: false
  when: _target_profile_type == 'client'

- name: Buscar detalhes do Server SSL Profile alvo
  ansible.builtin.uri:
    url: >-
      https://{{ _f5_srv }}:{{ _f5_port }}/mgmt/tm/ltm/profile/server-ssl/~{{ _profile_partition }}~{{ _profile_name }}?$select=cert,key,chain
    method: GET
    user: "{{ f5_user }}"
    password: "{{ f5_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs | bool }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _server_prof_before_raw
  changed_when: false
  when: _target_profile_type == 'server'

- name: Capturar estado atual do Client SSL Profile
  ansible.builtin.set_fact:
    _before_cert: "{{ (_client_prof_raw.json.certKeyChain[0].cert | default('')) }}"
    _before_key: "{{ (_client_prof_raw.json.certKeyChain[0].key | default('')) }}"
    _before_chain: "{{ (_client_prof_raw.json.certKeyChain[0].chain | default('')) }}"
  when:
    - _target_profile_type == 'client'
    - (_client_prof_raw.json.certKeyChain | default([])) | length >= 1
  changed_when: false

- name: Capturar estado atual do Server SSL Profile
  ansible.builtin.set_fact:
    _before_cert: "{{ _server_prof_before_raw.json.cert | default('') }}"
    _before_key: "{{ _server_prof_before_raw.json.key | default('') }}"
    _before_chain: "{{ _server_prof_before_raw.json.chain | default('') }}"
  when: _target_profile_type == 'server'
  changed_when: false

- name: Garantir rotation_id sempre definido
  ansible.builtin.set_fact:
    _rotation_id: "{{ _rotation_id | default(site.name ~ '|' ~ (_seed_current_cert_resolved | default('')) ~ '|' ~ _folder_full) }}"
  changed_when: false

- name: Resolver Virtual Servers/Pools/Targets via cache do site
  ansible.builtin.set_fact:
    _virtuals_for_profile: "{{ (_site_virtual_index | default({})).get('/' ~ _profile_partition ~ '/' ~ _profile_name, []) }}"
  changed_when: false

- name: Falhar se Client SSL Profile alvo tiver mais de 1 entrada em certKeyChain
  ansible.builtin.fail:
    msg: |
      [{{ site.name }}] Profile /{{ _profile_partition }}/{{ _profile_name }} tem {{ (_client_prof_raw.json.certKeyChain | default([])) | length }} entradas em certKeyChain.
      Para evitar sobrescrever um cenário SNI/múltiplos certificados, esta automação só troca profiles com 1 entrada.
  when:
    - _target_profile_type == 'client'
    - (_client_prof_raw.json.certKeyChain | default([])) | length > 1

- name: Definir base dos nomes de objetos no F5
  ansible.builtin.set_fact:
    _f5_import_base_name: "{{ _folder_full | regex_replace('[^A-Za-z0-9._-]', '_') }}"
    _f5_import_suffix: "{{ f5_import_name_suffix_eff | default('') | trim }}"
  changed_when: false

- name: Definir nome desejado dos objetos no F5
  ansible.builtin.set_fact:
    _f5_import_desired_base: >-
      {{
        _f5_import_base_name ~ '-' ~ _f5_import_suffix
        if (
          (f5_import_name_suffix_enabled | default(true) | bool)
          and (_f5_import_suffix | length > 0)
        )
        else _f5_import_base_name
      }}
  changed_when: false

- name: Montar lista de certificados já existentes no site
  ansible.builtin.set_fact:
    _site_existing_cert_obj_names: >-
      {{
        (_site_installed_certs | default([]))
        | map(attribute='name')
        | map('string')
        | list
      }}
  changed_when: false

- name: Validar colisão de nome quando strategy=fail
  ansible.builtin.assert:
    that:
      - ((_f5_import_desired_base ~ '.crt') not in (_site_existing_cert_obj_names | default([])))
    fail_msg: >-
      O objeto /{{ _profile_partition }}/{{ _f5_import_desired_base }}.crt já existe no F5 {{ site.name }}.
      Como f5_import_name_collision_strategy=fail, a automação não vai sobrescrever.
      Altere o sufixo, remova o objeto antigo ou use f5_import_name_collision_strategy=increment.
  when:
    - f5_import_name_suffix_enabled | default(true) | bool
    - (f5_import_name_collision_strategy | default('increment')) == 'fail'

- name: Escolher base final dos objetos no F5 com incremento automático
  ansible.builtin.set_fact:
    _f5_import_final_base: >-
      {%- set out = [] -%}
      {%- set max_try = (f5_import_name_collision_max_attempts | default(20) | int) -%}
      {%- for i in range(1, max_try + 1) -%}
      {%- set candidate_base = _f5_import_desired_base if i == 1 else (_f5_import_desired_base ~ '-' ~ i) -%}
      {%- set candidate_cert = candidate_base ~ '.crt' -%}
      {%- if (candidate_cert not in (_site_existing_cert_obj_names | default([]))) and (out | length == 0) -%}
      {%- set _ = out.append(candidate_base) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ out[0] | default('') }}
  when:
    - (f5_import_name_collision_strategy | default('increment')) == 'increment'
  changed_when: false

- name: Definir base final dos objetos no F5 sem incremento
  ansible.builtin.set_fact:
    _f5_import_final_base: "{{ _f5_import_desired_base }}"
  when:
    - (f5_import_name_collision_strategy | default('increment')) != 'increment'
  changed_when: false

- name: Falhar se não foi possível encontrar nome livre para importação
  ansible.builtin.assert:
    that:
      - (_f5_import_final_base | default('') | trim | length) > 0
    fail_msg: >-
      Não foi possível encontrar nome livre para importar {{ _f5_import_desired_base }} no F5 {{ site.name }}.
      Tentativas: {{ f5_import_name_collision_max_attempts | default(20) }}.
      Ajuste f5_import_name_collision_max_attempts, use outro sufixo ou limpe objetos antigos.

- name: Definir nomes finais dos objetos no F5
  ansible.builtin.set_fact:
    _cert_obj: "{{ _f5_import_final_base }}.crt"
    _key_obj: "{{ _f5_import_final_base }}.key"
    _chain_obj: "{{ _f5_import_final_base }}-chain.crt"
  changed_when: false

- name: Ler certificado do CIFS
  ansible.builtin.slurp:
    src: "{{ _src_cert.cer_path }}"
  register: _cer_slurp
  become: true

- name: Ler chave do CIFS
  ansible.builtin.slurp:
    src: "{{ _src_cert.key_path }}"
  register: _key_slurp
  become: true

- name: Ler chain do CIFS se habilitado
  ansible.builtin.slurp:
    src: "{{ _src_cert.ca_chain_path }}"
  register: _chain_slurp
  become: true
  when:
    - (f5_enable_chain_import | bool) or (f5_enable_chain_on_profile | bool)
    - (_src_cert.ca_chain_path | default('') | trim | length > 0)

- name: Importar certificado no F5
  f5networks.f5_modules.bigip_ssl_certificate:
    name: "{{ _cert_obj }}"
    partition: "{{ _profile_partition }}"
    content: "{{ _cer_slurp.content | b64decode }}"
    true_names: true
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Importar chave no F5
  f5networks.f5_modules.bigip_ssl_key:
    name: "{{ _key_obj }}"
    partition: "{{ _profile_partition }}"
    content: "{{ _key_slurp.content | b64decode }}"
    true_names: true
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Importar chain no F5 se habilitado
  f5networks.f5_modules.bigip_ssl_certificate:
    name: "{{ _chain_obj }}"
    partition: "{{ _profile_partition }}"
    content: "{{ _chain_slurp.content | b64decode }}"
    true_names: true
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost
  when:
    - (f5_enable_chain_import | bool)
    - (_src_cert.ca_chain_path | default('') | trim | length > 0)

- name: Atualizar Client SSL Profile
  f5networks.f5_modules.bigip_profile_client_ssl:
    name: "{{ _profile_name }}"
    partition: "{{ _profile_partition }}"
    cert_key_chain:
      - cert: "{{ _cert_obj }}"
        key: "{{ _key_obj }}"
        true_names: true
        chain: >-
          {{
            _chain_obj
            if (
              (f5_enable_chain_on_profile | bool)
              and (_src_cert.ca_chain_path | default('') | trim | length > 0)
            )
            else omit
          }}
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost
  when: _target_profile_type == 'client'

- name: Atualizar Server SSL Profile
  ansible.builtin.uri:
    url: >-
      https://{{ _f5_srv }}:{{ _f5_port }}/mgmt/tm/ltm/profile/server-ssl/~{{ _profile_partition }}~{{ _profile_name }}
    method: PATCH
    user: "{{ f5_user }}"
    password: "{{ f5_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs | bool }}"
    return_content: true
    status_code: [200]
    body_format: json
    body: >-
      {{
        {
          'cert': '/' ~ _profile_partition ~ '/' ~ _cert_obj,
          'key': '/' ~ _profile_partition ~ '/' ~ _key_obj
        }
        | combine(
            {
              'chain': '/' ~ _profile_partition ~ '/' ~ _chain_obj
            }
            if (
              (f5_enable_chain_on_profile | bool)
              and (_src_cert.ca_chain_path | default('') | trim | length > 0)
            )
            else {},
            recursive=True
          )
      }}
  delegate_to: localhost
  register: _server_prof_update_raw
  changed_when: true
  when: _target_profile_type == 'server'

- name: Buscar Server SSL Profile depois da alteração
  ansible.builtin.uri:
    url: >-
      https://{{ _f5_srv }}:{{ _f5_port }}/mgmt/tm/ltm/profile/server-ssl/~{{ _profile_partition }}~{{ _profile_name }}?$select=cert,key,chain
    method: GET
    user: "{{ f5_user }}"
    password: "{{ f5_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs | bool }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _server_prof_after_raw
  changed_when: false
  when: _target_profile_type == 'server'

- name: Definir validação Server SSL
  ansible.builtin.set_fact:
    _server_expected_cert: "{{ '/' ~ _profile_partition ~ '/' ~ _cert_obj }}"
    _server_expected_key: "{{ '/' ~ _profile_partition ~ '/' ~ _key_obj }}"
    _server_expected_chain: >-
      {{
        ('/' ~ _profile_partition ~ '/' ~ _chain_obj)
        if (
          (f5_enable_chain_on_profile | bool)
          and (_src_cert.ca_chain_path | default('') | trim | length > 0)
        )
        else ''
      }}
    _server_actual_cert: "{{ _server_prof_after_raw.json.cert | default('') }}"
    _server_actual_key: "{{ _server_prof_after_raw.json.key | default('') }}"
    _server_actual_chain: "{{ _server_prof_after_raw.json.chain | default('') }}"
  when: _target_profile_type == 'server'
  changed_when: false

- name: Calcular status da validação Server SSL
  ansible.builtin.set_fact:
    _server_config_ok: >-
      {{
        (_server_actual_cert | default('')) == (_server_expected_cert | default(''))
        and (_server_actual_key | default('')) == (_server_expected_key | default(''))
        and (
          (_server_expected_chain | default('') | length) == 0
          or (_server_actual_chain | default('')) == (_server_expected_chain | default(''))
        )
      }}
  when: _target_profile_type == 'server'
  changed_when: false

- name: Registrar validação Server SSL
  ansible.builtin.set_fact:
    f5_serverssl_config_validation_results: >-
      {{
        (f5_serverssl_config_validation_results | default([]))
        + [
          {
            'rotation_id': (_rotation_id | string),
            'site': (site.name | string),
            'f5_server': (site.server | string),
            'profile': ('/' ~ _profile_partition ~ '/' ~ _profile_name),
            'profile_type': 'server',
            'expected': {
              'cert': (_server_expected_cert | default('')),
              'key': (_server_expected_key | default('')),
              'chain': (_server_expected_chain | default(''))
            },
            'actual': {
              'cert': (_server_actual_cert | default('')),
              'key': (_server_actual_key | default('')),
              'chain': (_server_actual_chain | default(''))
            },
            'ok': (_server_config_ok | default(false) | bool)
          }
        ]
      }}
  when: _target_profile_type == 'server'
  changed_when: false

- name: Falhar se Server SSL Profile não ficou com cert/key/chain esperado
  ansible.builtin.fail:
    msg: >-
      Server SSL Profile /{{ _profile_partition }}/{{ _profile_name }} não ficou com a configuração esperada.
      Esperado cert={{ _server_expected_cert | default('') }},
      key={{ _server_expected_key | default('') }},
      chain={{ _server_expected_chain | default('') }}.
      Atual cert={{ _server_actual_cert | default('') }},
      key={{ _server_actual_key | default('') }},
      chain={{ _server_actual_chain | default('') }}.
  when:
    - _target_profile_type == 'server'
    - f5_server_ssl_validation_mode | default('config_only') == 'config_only'
    - not (_server_config_ok | default(false) | bool)

- name: Salvar running-config
  f5networks.f5_modules.bigip_config:
    save: yes
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Materializar dados do report
  ansible.builtin.set_fact:
    _report_discovery_source: "{{ _seed_profile_full_resolved | default('') | string }}"
    _report_current_shared_cert: "{{ _seed_current_cert_resolved | default('') | string }}"
    _report_profile: "{{ '/' ~ _profile_partition ~ '/' ~ _profile_name }}"
    _report_profile_type: "{{ _target_profile_type }}"
    _report_after_cert: >-
      {{
        (_server_actual_cert | default(''))
        if _target_profile_type == 'server'
        else ('/' ~ _profile_partition ~ '/' ~ _cert_obj)
      }}
    _report_after_key: >-
      {{
        (_server_actual_key | default(''))
        if _target_profile_type == 'server'
        else ('/' ~ _profile_partition ~ '/' ~ _key_obj)
      }}
    _report_after_chain: >-
      {%- if _target_profile_type == 'server' -%}
        {{ _server_actual_chain | default('') }}
      {%- else -%}
        {{
          ('/' ~ _profile_partition ~ '/' ~ _chain_obj)
          if (
            (f5_enable_chain_on_profile | bool)
            and (_src_cert.ca_chain_path | default('') | trim | length > 0)
          )
          else 'não usado'
        }}
      {%- endif -%}
    _report_before_cert: "{{ _before_cert | default('') | string }}"
    _report_before_key: "{{ _before_key | default('') | string }}"
    _report_before_chain: "{{ _before_chain | default('') | string }}"
    _report_expected_enddate: "{{ _src_cert.not_after | default('') | string }}"
    _report_virtuals: "{{ _virtuals_for_profile | default([]) }}"
    _report_dns_sans: "{{ _src_cert.sans | default(_src_cert.dns_sans | default([])) }}"
  changed_when: false

- name: Registrar resultado da rotação
  ansible.builtin.set_fact:
    f5_rotation_results: >-
      {{
        (f5_rotation_results | default([])) + [ {
          'rotation_id': (_rotation_id | string),
          'site': (site.name | string),
          'f5_server': (site.server | string),
          'discovery_source': _report_discovery_source,
          'current_shared_cert': _report_current_shared_cert,
          'profile': _report_profile,
          'profile_type': _report_profile_type,
          'cifs_folder': (_folder_full | string),
          'before': {
            'cert': _report_before_cert,
            'key': _report_before_key,
            'chain': _report_before_chain
          },
          'after': {
            'cert': _report_after_cert,
            'key': _report_after_key,
            'chain': _report_after_chain
          },
          'virtuals': _report_virtuals,
          'dns_sans': _report_dns_sans,
          'expected_enddate': _report_expected_enddate
        } ]
      }}
  changed_when: false
