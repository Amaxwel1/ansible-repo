---
- name: Buscar detalhes do profile alvo
  ansible.builtin.uri:
    url: >-
      https://{{ _f5_srv }}:{{ _f5_port }}/mgmt/tm/ltm/profile/client-ssl/~{{ _profile_partition }}~{{ _profile_name }}?$select=certKeyChain
    method: GET
    user: "{{ f5_user }}"
    password: "{{ f5_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs | bool }}"
    return_content: true
    status_code: [200]
  delegate_to: localhost
  register: _prof_raw
  changed_when: false

- name: Capturar estado atual do profile alvo
  ansible.builtin.set_fact:
    _before_cert: "{{ (_prof_raw.json.certKeyChain[0].cert | default('')) }}"
    _before_key: "{{ (_prof_raw.json.certKeyChain[0].key | default('')) }}"
    _before_chain: "{{ (_prof_raw.json.certKeyChain[0].chain | default('')) }}"
  when: (_prof_raw.json.certKeyChain | default([])) | length >= 1
  changed_when: false

- name: Garantir rotation_id sempre definido
  ansible.builtin.set_fact:
    _rotation_id: "{{ _rotation_id | default(site.name ~ '|' ~ (_seed_current_cert_resolved | default('')) ~ '|' ~ _folder_full) }}"
  changed_when: false

- name: Resolver Virtual Servers/Pools/Targets via cache do site
  ansible.builtin.set_fact:
    _virtuals_for_profile: "{{ (_site_virtual_index | default({})).get('/' ~ _profile_partition ~ '/' ~ _profile_name, []) }}"
  changed_when: false

- name: Falhar se profile alvo tiver mais de 1 entrada em certKeyChain
  ansible.builtin.fail:
    msg: |
      [{{ site.name }}] Profile /{{ _profile_partition }}/{{ _profile_name }} tem {{ (_prof_raw.json.certKeyChain | default([])) | length }} entradas em certKeyChain.
      Para evitar sobrescrever um cenário SNI/múltiplos certificados, esta automação só troca profiles com 1 entrada.
  when:
    - (_prof_raw.json.certKeyChain | default([])) | length > 1

- name: Definir nomes padrão dos objetos no F5
  ansible.builtin.set_fact:
    _cert_obj: "{{ (_folder_full | regex_replace('[^A-Za-z0-9._-]', '_')) ~ '.crt' }}"
    _key_obj: "{{ (_folder_full | regex_replace('[^A-Za-z0-9._-]', '_')) ~ '.key' }}"
    _chain_obj: "{{ (_folder_full | regex_replace('[^A-Za-z0-9._-]', '_')) ~ '-chain.crt' }}"
  changed_when: false

- name: Ler certificado do CIFS
  ansible.builtin.slurp:
    src: "{{ _src_cert.cer_path }}"
  register: _cer_slurp
  become: true

- name: Ler chave do CIFS
  ansible.builtin.slurp:
    src: "{{ _src_cert.key_path }}"
  register: _key_slurp
  become: true

- name: Ler chain do CIFS se habilitado
  ansible.builtin.slurp:
    src: "{{ _src_cert.ca_chain_path }}"
  register: _chain_slurp
  become: true
  when:
    - (f5_enable_chain_import | bool) or (f5_enable_chain_on_profile | bool)
    - (_src_cert.ca_chain_path | default('') | trim | length > 0)

- name: Importar certificado no F5
  f5networks.f5_modules.bigip_ssl_certificate:
    name: "{{ _cert_obj }}"
    partition: "{{ _profile_partition }}"
    content: "{{ _cer_slurp.content | b64decode }}"
    true_names: true
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Importar chave no F5
  f5networks.f5_modules.bigip_ssl_key:
    name: "{{ _key_obj }}"
    partition: "{{ _profile_partition }}"
    content: "{{ _key_slurp.content | b64decode }}"
    true_names: true
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Importar chain no F5 se habilitado
  f5networks.f5_modules.bigip_ssl_certificate:
    name: "{{ _chain_obj }}"
    partition: "{{ _profile_partition }}"
    content: "{{ _chain_slurp.content | b64decode }}"
    true_names: true
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost
  when:
    - (f5_enable_chain_import | bool)
    - (_src_cert.ca_chain_path | default('') | trim | length > 0)

- name: Atualizar Client SSL Profile
  f5networks.f5_modules.bigip_profile_client_ssl:
    name: "{{ _profile_name }}"
    partition: "{{ _profile_partition }}"
    cert_key_chain:
      - cert: "{{ _cert_obj }}"
        key: "{{ _key_obj }}"
        chain: >-
          {{
            _chain_obj
            if (
              (f5_enable_chain_on_profile | bool)
              and (_src_cert.ca_chain_path | default('') | trim | length > 0)
            )
            else omit
          }}
    state: present
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Salvar running-config
  f5networks.f5_modules.bigip_config:
    save: yes
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost

- name: Materializar dados do report
  ansible.builtin.set_fact:
    _report_discovery_source: "{{ _seed_profile_full_resolved | default('') | string }}"
    _report_current_shared_cert: "{{ _seed_current_cert_resolved | default('') | string }}"
    _report_profile: "{{ '/' ~ _profile_partition ~ '/' ~ _profile_name }}"
    _report_after_cert: "{{ '/' ~ _profile_partition ~ '/' ~ _cert_obj }}"
    _report_after_key: "{{ '/' ~ _profile_partition ~ '/' ~ _key_obj }}"
    _report_after_chain: >-
      {{
        ('/' ~ _profile_partition ~ '/' ~ _chain_obj)
        if (
          (f5_enable_chain_on_profile | bool)
          and (_src_cert.ca_chain_path | default('') | trim | length > 0)
        )
        else 'não usado'
      }}
    _report_before_cert: "{{ _before_cert | default('') | string }}"
    _report_before_key: "{{ _before_key | default('') | string }}"
    _report_before_chain: "{{ _before_chain | default('') | string }}"
    _report_expected_enddate: "{{ _src_cert.not_after | default('') | string }}"
    _report_virtuals: "{{ _virtuals_for_profile | default([]) }}"
    _report_dns_sans: "{{ _src_cert.dns_sans | default([]) }}"
  changed_when: false

- name: Registrar resultado da rotação
  ansible.builtin.set_fact:
    f5_rotation_results: >-
      {{
        (f5_rotation_results | default([])) + [ {
          'rotation_id': (_rotation_id | string),
          'site': (site.name | string),
          'f5_server': (site.server | string),
          'discovery_source': _report_discovery_source,
          'current_shared_cert': _report_current_shared_cert,
          'profile': _report_profile,
          'cifs_folder': (_folder_full | string),
          'before': {
            'cert': _report_before_cert,
            'key': _report_before_key,
            'chain': _report_before_chain
          },
          'after': {
            'cert': _report_after_cert,
            'key': _report_after_key,
            'chain': _report_after_chain
          },
          'virtuals': _report_virtuals,
          'dns_sans': _report_dns_sans,
          'expected_enddate': _report_expected_enddate
        } ]
      }}
  changed_when: false
