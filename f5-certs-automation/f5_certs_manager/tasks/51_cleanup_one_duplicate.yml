---
- name: Definir alvo do cleanup (oldest)
  ansible.builtin.set_fact:
    _dc: "{{ dg.oldest }}"
    _dc_in_use: "{{ dg.oldest_in_use | default(false) | bool }}"
  changed_when: false

- name: Skip - oldest em uso e modo seguro ligado
  ansible.builtin.set_fact:
    f5_cleanup_results: >-
      {{
        f5_cleanup_results + [{
          'cert': (_dc.full_path | default('—')),
          'action': 'SKIPPED',
          'reason': 'Em uso por profile (safe-mode)'
        }]
      }}
  when:
    - f5_duplicate_cleanup_only_if_not_in_use | bool
    - _dc_in_use | bool

- name: Deletar certificado (ssl-cert) no F5
  f5networks.f5_modules.bigip_ssl_certificate:
    name: "{{ _dc.name }}"
    partition: "{{ _dc.tmPartition | default('Common') }}"
    true_names: true
    state: absent
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost
  when:
    - not (f5_duplicate_cleanup_only_if_not_in_use | bool and _dc_in_use | bool)

- name: Deletar key com mesmo nome
  f5networks.f5_modules.bigip_ssl_key:
    name: "{{ _dc.name }}"
    partition: "{{ _dc.tmPartition | default('Common') }}"
    true_names: true
    state: absent
    provider: "{{ f5_provider_eff }}"
  delegate_to: localhost
  when:
    - f5_cleanup_delete_key | bool
    - not (f5_duplicate_cleanup_only_if_not_in_use | bool and _dc_in_use | bool)

- name: Registrar resultado DELETED
  ansible.builtin.set_fact:
    f5_cleanup_results: >-
      {{
        f5_cleanup_results + [{
          'cert': (_dc.full_path | default('—')),
          'action': 'DELETED',
          'reason': 'Duplicado expirado há ' ~ (dg.days_since_expired_oldest | string) ~ ' dias'
        }]
      }}
  when:
    - not (f5_duplicate_cleanup_only_if_not_in_use | bool and _dc_in_use | bool)
