---
- name: Falhar se não houver plano de rotação
  ansible.builtin.assert:
    that:
      - (f5_rotation_plan | default([])) | length > 0
    fail_msg: "Modo apply exige f5_rotation_plan com pelo menos 1 item."

- name: Garantir que inventário de fonte está disponível
  ansible.builtin.assert:
    that:
      - source_cert_inventory is defined
      - (source_cert_inventory | length) > 0
    fail_msg: |
      Não foi possível coletar certificados-fonte do CIFS.
      Confira: mount_cifs, certificate_prefix, ansible_user/ansible_password.

- name: Inicializar coleções do apply
  ansible.builtin.set_fact:
    f5_rotation_results: []
    f5_handshake_results: []
    f5_virtuals_index_by_site: {}
    f5_clientssl_profiles_by_site: {}
    f5_installed_certs_by_site: {}
  changed_when: false

- name: Construir cache de Virtual Servers por profile (1x por site)
  ansible.builtin.include_tasks: 13_build_virtual_cache_for_site.yml
  loop: "{{ f5_sites_eff }}"
  loop_control:
    loop_var: site
    label: "{{ site.name }}:{{ site.server }}"

- name: Construir cache de Client SSL Profiles (1x por site)
  ansible.builtin.include_tasks: 14_build_clientssl_cache_for_site.yml
  loop: "{{ f5_sites_eff }}"
  loop_control:
    loop_var: site
    label: "{{ site.name }}:{{ site.server }}"

- name: Construir cache de certificados instalados (1x por site)
  ansible.builtin.include_tasks: 15_build_cert_cache_for_site.yml
  loop: "{{ f5_sites_eff }}"
  loop_control:
    loop_var: site
    label: "{{ site.name }}:{{ site.server }}"

- name: Executar rotação por item (aplica em todos os sites)
  ansible.builtin.include_tasks: 41_apply_one_rotation.yml
  loop: "{{ f5_rotation_plan }}"
  loop_control:
    loop_var: rot
    label: >-
      {{
        (rot.profile_partition | default('Common')) ~ '/' ~ (rot.profile_name | default(''))
        if ((rot.profile_name | default('') | trim | length) > 0)
        else ('prefix=' ~ (rot.certificate_prefix | default('') | trim))
      }}
