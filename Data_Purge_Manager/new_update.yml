- name: Windows | Verificar existência do arquivo de auditoria remoto
  ansible.windows.win_stat:
    path: "{{ purge_windows_audit_file }}"
  register: _purge_windows_audit_file_stat
  changed_when: false
  failed_when: false
  when:
    - purge_deleted_files_audit_enabled | default(true) | bool

- name: Windows | Buscar arquivo de auditoria para o controller
  ansible.builtin.fetch:
    src: "{{ purge_windows_audit_file }}"
    dest: "{{ purge_audit_controller_dir }}/"
    flat: true
    fail_on_missing: false
  register: _purge_windows_audit_fetch
  when:
    - purge_deleted_files_audit_enabled | default(true) | bool
    - _purge_windows_audit_file_stat.stat.exists | default(false) | bool

- name: Windows | Registrar ausência de arquivo de auditoria
  ansible.builtin.set_fact:
    purge_audit_warnings: >-
      {{
        purge_audit_warnings | default([]) +
        [
          {
            'host': inventory_hostname,
            'os': 'windows',
            'message': 'Arquivo de auditoria não foi gerado no host. O expurgo continuará sem TXT deste host.'
          }
        ]
      }}
  when:
    - purge_deleted_files_audit_enabled | default(true) | bool
    - not (_purge_windows_audit_file_stat.stat.exists | default(false) | bool)



