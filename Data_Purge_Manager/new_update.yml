- name: Publicar HTML de falha para envio de e-mail
  ansible.builtin.set_stats:
    aggregate: false
    data:
      send_mail_subject: "{{ _purge_failure_subject }}"
      send_mail_body: "{{ _purge_failure_body }}"
      send_mail_attachments: []
      send_mail_cifs_remote_files: []
