---
- name: Data Purge Manager | Bloco controlado do planejamento
  block:
    - name: Normalizar entradas
      ansible.builtin.import_tasks: 00_normalize_inputs.yml

    - name: Carregar matriz e aplicações
      ansible.builtin.import_tasks: 10_load_config.yml

    - name: Resolver plano de expurgo
      ansible.builtin.import_tasks: 20_resolve_plan.yml

    - name: Validar plano de expurgo
      ansible.builtin.import_tasks: 30_validate_plan.yml

    - name: Criar inventário dinâmico
      ansible.builtin.import_tasks: 35_create_dynamic_hosts.yml

  rescue:
    - name: Montar email de falha controlada
      ansible.builtin.import_tasks: 90_build_failure_report.yml

    - name: Encerrar job após publicar email de falha
      ansible.builtin.fail:
        msg: "Data Purge Manager falhou no planejamento. O HTML de falha foi publicado em send_mail_body."
