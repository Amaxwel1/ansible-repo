---
- name: Capturar contexto da falha
  ansible.builtin.set_fact:
    purge_failure_task: "{{ ansible_failed_task.name | default('—') }}"
    purge_failure_action: "{{ ansible_failed_task.action | default('—') }}"
    purge_failure_msg: "{{ ansible_failed_result.msg | default(ansible_failed_result.stderr | default(ansible_failed_result.stdout | default('Erro não mapeado'))) }}"
    purge_failure_raw: "{{ ansible_failed_result | default({}) }}"
    purge_failure_date_br: "{{ lookup('ansible.builtin.pipe', 'TZ=' ~ purge_report_timezone ~ ' date +%d/%m/%Y\\ %H:%M:%S') }}"

- name: Classificar categoria da falha
  ansible.builtin.set_fact:
    purge_failure_category: >-
      {%- set raw = (purge_failure_msg ~ ' ' ~ (purge_failure_raw | string)) | lower -%}
      {%- if ('aplicação/perfil de expurgo inexistente' in raw) or ('aplicação' in raw and 'inexistente' in raw) -%}
      Aplicação inexistente na configuração
      {%- elif 'ambiente inexistente' in raw -%}
      Ambiente inexistente na matriz
      {%- elif 'nenhum host' in raw -%}
      Nenhum host resolvido
      {%- elif 'matriz não encontrado' in raw or 'arquivo de matriz' in raw or 'matriz não existir' in raw -%}
      Arquivo de matriz não encontrado
      {%- elif 'winrm' in raw or '5985' in raw or '5986' in raw -%}
      Falha de conectividade WinRM
      {%- elif 'ssh' in raw or 'porta 22' in raw -%}
      Falha de conectividade SSH
      {%- elif 'access is denied' in raw or 'permission denied' in raw or 'acesso negado' in raw -%}
      Permissão insuficiente
      {%- elif 'path proibido' in raw or 'allowed_prefix' in raw or 'fora dos allowed_prefixes' in raw -%}
      Path bloqueado por segurança
      {%- elif '\\\\' in raw or 'unc' in raw or 'smb' in raw -%}
      Falha em caminho UNC/compartilhamento
      {%- else -%}
      Erro não classificado automaticamente
      {%- endif -%}

- name: Definir orientação da falha
  ansible.builtin.set_fact:
    purge_failure_guidance: >-
      {%- set cat = purge_failure_category | trim -%}
      {%- if cat == 'Aplicação inexistente na configuração' -%}
      Validar purge_applications e confirmar se existe arquivo correspondente em config/purge_manager/apps/.
      {%- elif cat == 'Ambiente inexistente na matriz' -%}
      Validar purge_env e confirmar se o ambiente existe em config/purge_manager/purge_matrix.yml.
      {%- elif cat == 'Nenhum host resolvido' -%}
      Validar members da aplicação no ambiente selecionado ou informar survey_hosts. Se for teste ad-hoc, avaliar purge_allow_survey_hosts_outside_matrix=true.
      {%- elif cat == 'Arquivo de matriz não encontrado' -%}
      Validar purge_matrix_file, purge_config_root e o empacotamento do projeto no AAP. Com site.yml na raiz, purge_config_root deve ser {{ '{{ playbook_dir }}/config/purge_manager' }}.
      {%- elif cat == 'Permissão insuficiente' -%}
      Validar permissões da conta usada pelo WinRM/SSH no diretório alvo e no compartilhamento.
      {%- elif cat == 'Falha em caminho UNC/compartilhamento' -%}
      Validar acesso ao UNC a partir do host Windows, autenticação SMB e permissões de share/NTFS.
      {%- elif cat == 'Path bloqueado por segurança' -%}
      Validar forbidden_paths, allowed_prefixes da aplicação e se o path está correto.
      {%- else -%}
      Consultar a task, ação e mensagem técnica abaixo para identificar a origem da falha.
      {%- endif -%}

- name: Montar assunto e HTML de falha
  ansible.builtin.set_fact:
    send_mail_subject: >-
      {{ purge_report_subject_prefix }} (FALHA) - {{ purge_report_title }} - Job #{{ tower_job_id | default(awx_job_id | default('local')) }}
    send_mail_body: "{{ lookup('ansible.builtin.template', 'report_failure.html.j2') }}"

- name: Publicar set_stats de falha
  ansible.builtin.set_stats:
    data:
      send_mail_subject: "{{ send_mail_subject }}"
      send_mail_body: "{{ send_mail_body }}"
