---
# Modo seguro por padrão. Para apagar de verdade, usar:
# purge_mode=apply + purge_confirm_delete=sim

purge_mode: "check" # check | apply
purge_confirm_delete: "nao" # sim | nao
purge_include_global_rules: "sim" # sim | nao
purge_delete_empty_dirs_default: "nao" # sim | nao

# survey
survey_hosts: "" # host1,host2. Quando vazio, resolve pela matriz.
purge_applications: "" # app1,app2. Quando vazio, usa todas as apps carregadas.
purge_env: "" # hml,prd,dr. Quando vazio, usa todos os ambientes da matriz.
motivo: "" # motivo operacional para aparecer no relatório.

# Caminhos de configuração. Como o playbook fica em playbooks/site.yml, o default aponta para ../config.
purge_config_root: "{{ playbook_dir }}/config/purge_manager"
purge_matrix_file: "{{ purge_config_root }}/purge_matrix.yml"
purge_apps_dir: "{{ purge_config_root }}/apps"

# Comportamento de resolução.
purge_fail_on_no_hosts: true
purge_allow_survey_hosts_outside_matrix: false
purge_global_rules_apply_to_adhoc_hosts: true

# Estratégia padrão de execução.
# modules: usa ansible.builtin.find/file e ansible.windows.win_find/win_file.
purge_engine_default: "modules"

# Detecção de SO por porta.
purge_wait_timeout: 3
purge_windows_port: 5985
purge_linux_port: 22

# Conexão Windows padrão usada ao criar inventário dinâmico.
purge_windows_connection: "winrm"
purge_windows_winrm_transport: "ntlm"
purge_windows_winrm_server_cert_validation: "ignore"
purge_windows_operation_timeout_sec: 120
purge_windows_read_timeout_sec: 180

# Linux
purge_linux_become: true

# Segurança de path.
purge_min_path_length_linux: 4
purge_min_path_length_windows: 6
purge_enforce_allowed_prefixes: true
purge_allowed_prefixes_required: false

purge_forbidden_paths_linux:
  - "/"
  - "/bin"
  - "/boot"
  - "/dev"
  - "/etc"
  - "/home"
  - "/lib"
  - "/lib64"
  - "/opt"
  - "/proc"
  - "/root"
  - "/run"
  - "/sbin"
  - "/sys"
  - "/usr"
  - "/var"

purge_forbidden_paths_windows:
  - "C:\\"
  - "D:\\"
  - "E:\\"
  - "C:\\Windows"
  - "C:\\Program Files"
  - "C:\\Program Files (x86)"
  - "C:\\Users"

purge_default_allowed_prefixes_linux: []
purge_default_allowed_prefixes_windows: []

# Relatório.
purge_report_timezone: "America/Sao_Paulo"
purge_report_sample_limit: 50
purge_report_title: "Data Purge Manager"
purge_report_subject_prefix: "Ansible-Report"
