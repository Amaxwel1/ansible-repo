---
# Contexto / identificação
motivo: "Teste Automacao"
sql_environment: "hml"

# Topologia do alvo
# single     -> instância standalone
# cluster -> Always On Availability Group
sql_topology: "single" # single | cluster

# Hosts informados no survey
# Ex.: host1,host2,host3
survey_hosts: ""

# Quando true e a topologia for cluster, a automação expande o escopo
# para todos os nós descobertos no AG.
ag_expand_to_all_nodes: false

# Quando verdadeiro, permite patch parcial em AG (ex.: apenas 1 secundária)
ag_allow_partial_patch: true

# Regra operacional para escolher a secundária candidata ao failover.
# Ex.: nomes contendo -MZ-
ag_failover_preferred_regex: "-MZ-"
ag_failover_enabled: true
ag_failback_to_original_primary: false
ag_auto_add_failover_candidate_when_primary_selected: true

# Instância SQL
# SQLPRD13, SQLPRD20, BBI01, TFS01
sql_instance_name: ""
sql_discover_instances_automatically: true

# Timeout de cada consulta SQL via Invoke-Sqlcmd
sql_query_timeout_seconds: 300
# Janela total de espera do AG após patch/failover
ag_health_wait_timeout_seconds: 3600

# Intervalo entre checagens do health do AG
ag_health_poll_interval_seconds: 60
sql_powershell_module_name: "SqlServer"

# Espera de estabilização do single após patch
single_instance_wait_timeout_seconds: 1800
single_instance_poll_interval_seconds: 30

patch_reboot_after_validation: true

patch_reboot_timeout_seconds: 3600
patch_reboot_connect_timeout_seconds: 30
patch_reboot_post_delay_seconds: 60

# Patch no CIFS
patch_cifs_share: ""
patch_cifs_mount_path: "/opt/ansiblefiles/files/sql-patches"
patch_cifs_root: "{{ patch_cifs_mount_path }}"
patch_temp_folder: "/opt/ansiblefiles/files"
patch_package_name: ""
patch_package_local_path: ""
patch_extract_subdir: ""
patch_cifs_username: "{{ ansible_user | default('') }}"
patch_cifs_password: "{{ ansible_password | default('') }}"
patch_cifs_domain: "" #agorasenior.corp

# Credencial temporária do CIFS no controller
_patch_cred_file: "{{ patch_temp_folder }}/ansible-autentication-cifs-{{ awx_job_id | default('local') }}"

# Destino no Windows
windows_patch_stage_dir: 'C:\Temp\sql_patch_manager'
windows_patch_work_dir: 'C:\Temp\sql_patch_manager\work'

# Instalador do patch
patch_installer_args: "/quiet /action=patch /instancename={{ patch_instance_name_effective }} /IAcceptSQLServerLicenseTerms"
patch_installer_args_allinstances: "/quiet /action=patch /allinstances /IAcceptSQLServerLicenseTerms"
patch_expected_return_codes: [0, 3010]
patch_reboot_if_required: false

# Remote Registry
remote_registry_service_name: "RemoteRegistry"
remote_registry_startup_type: "Manual"

# Mail / anexo / report
send_mail_cifs: "producao"
send_mail_cifs_path: "/Ansible/mail_attachments/"
send_mail_cifs_address:
  producao: "//192.168.0.115/certs"
  hml: "//192.168.0.115/certs"

# Segurança operacional
sql_require_healthy_before_patch: true
sql_require_healthy_after_each_step: true

# WinRM dinâmico para os hosts adicionados via survey
winrm_port: 5985
winrm_transport: "ntlm"
winrm_scheme: "http"
winrm_server_cert_validation: "ignore"

# check mode
sql_precheck_only: true
