---
- name: Garantir plano AG calculado
  ansible.builtin.assert:
    that:
      - ag_pre_failover_patch_hosts is defined
      - ag_post_failover_patch_hosts is defined
    fail_msg: "Plano de patch AG não foi calculado. Execute 33_precheck_ag.yml antes de 43_patch_ag.yml."
  run_once: true

- name: Aplicar patch nas réplicas pré-failover
  ansible.builtin.include_tasks: 43_patch_ag_one_pre_failover_host.yml
  vars:
    ag_patch_target_host: "{{ ag_pre_failover_host }}"
  loop: "{{ ag_pre_failover_patch_hosts }}"
  loop_control:
    loop_var: ag_pre_failover_host
    label: "{{ ag_pre_failover_host }}"
  when: ag_pre_failover_patch_hosts | length > 0
  run_once: true

- name: Executar failover quando a PRIMARY original estiver no escopo
  ansible.builtin.include_tasks: 42_failover_to_candidate.yml
  vars:
    ag_name: "{{ ag_discovery.ag_name }}"
    failover_candidate: "{{ ag_failover_candidate }}"
  when:
    - ag_original_primary_in_scope | bool
    - ag_failover_enabled | bool
  run_once: true

- name: Refazer discovery após failover
  ansible.builtin.include_tasks: 30_discover_sql_topology.yml
  when:
    - ag_original_primary_in_scope | bool
    - ag_failover_enabled | bool
  run_once: true

- name: Aguardar AG saudável após failover
  ansible.builtin.include_tasks: 44_wait_ag_healthy.yml
  when:
    - ag_original_primary_in_scope | bool
    - ag_failover_enabled | bool
  run_once: true

- name: Validar que a PRIMARY original saiu do papel de PRIMARY
  ansible.builtin.assert:
    that:
      - ag_original_primary_host != ag_discovery.primary_host
      - ag_original_primary_host in ag_discovery.secondary_hosts
    fail_msg: >-
      O failover foi executado, mas a PRIMARY original não apareceu como SECONDARY.
      Primary atual: {{ ag_discovery.primary_host }}
      Primary original: {{ ag_original_primary_host }}
  when:
    - ag_original_primary_in_scope | bool
    - ag_failover_enabled | bool
  run_once: true

- name: Reboot antes do patch da PRIMARY original agora como SECONDARY
  ansible.builtin.include_tasks: 39_reboot_host_before_patch.yml
  vars:
    patch_pre_reboot_target_host: "{{ ag_original_primary_host }}"
  when:
    - ag_original_primary_in_scope | bool
    - patch_reboot_before_patch | default(false) | bool
  run_once: true

- name: Aplicar patch na PRIMARY original agora como SECONDARY
  ansible.builtin.include_tasks: 41_patch_one_host.yml
  vars:
    patch_target_host: "{{ ag_original_primary_host }}"
  when: ag_original_primary_in_scope | bool
  run_once: true

- name: Refazer discovery após patch da PRIMARY original
  ansible.builtin.include_tasks: 30_discover_sql_topology.yml
  when:
    - ag_original_primary_in_scope | bool
    - sql_require_healthy_after_each_step | bool
  run_once: true

- name: Aguardar AG saudável após patch da PRIMARY original
  ansible.builtin.include_tasks: 44_wait_ag_healthy.yml
  when:
    - ag_original_primary_in_scope | bool
    - sql_require_healthy_after_each_step | bool
  run_once: true

- name: Failback opcional para a PRIMARY original
  ansible.builtin.include_tasks: 42_failover_to_candidate.yml
  vars:
    ag_name: "{{ ag_discovery.ag_name }}"
    failover_candidate: "{{ ag_original_primary_host }}"
  when:
    - ag_failback_to_original_primary | bool
    - ag_original_primary_in_scope | bool
    - ag_original_primary_host in ag_discovery.secondary_hosts
  run_once: true

- name: Refazer discovery após failback opcional
  ansible.builtin.include_tasks: 30_discover_sql_topology.yml
  when:
    - ag_failback_to_original_primary | bool
    - ag_original_primary_in_scope | bool
  run_once: true

- name: Aguardar AG saudável após failback opcional
  ansible.builtin.include_tasks: 44_wait_ag_healthy.yml
  when:
    - ag_failback_to_original_primary | bool
    - ag_original_primary_in_scope | bool
  run_once: true

- name: Registrar resumo do fluxo AG
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'actions': patch_report.actions + [ {
            'step': 'ag_patch_summary',
            'message': 'Fluxo AG executado com ordem real: reboot/patch em secondaries selecionadas -> failover -> reboot/patch da primary original -> espera AG saudável.'
          } ]
        }, recursive=True)
      }}
  run_once: true
