---
- name: Definir instância efetiva do patch
  ansible.builtin.set_fact:
    patch_instance_name_effective: "{{ patch_target_instance | default(sql_effective_instance_name | default(sql_instance_name)) }}"
    patch_mode_effective: "{{ patch_target_patch_mode | default('instancename') }}"
  run_once: true

- name: Definir argumentos efetivos do patch
  ansible.builtin.set_fact:
    patch_installer_args_effective: >-
      {{
        patch_installer_args_allinstances
        if patch_mode_effective == 'allinstances'
        else patch_installer_args
      }}
  run_once: true

- name: Garantir diretórios de staging no host {{ patch_target_host }}
  ansible.windows.win_file:
    path: "{{ stage_dir }}"
    state: directory
  loop:
    - "{{ windows_patch_stage_dir }}"
    - "{{ windows_patch_work_dir }}"
  loop_control:
    loop_var: stage_dir
  delegate_to: "{{ patch_target_host }}"

# - name: Copiar patch do controller para o host {{ patch_target_host }}
#   ansible.windows.win_copy:
#     src: "{{ patch_package_local_path }}"
#     dest: '{{ windows_patch_stage_dir }}\{{ patch_package_name }}'
#   delegate_to: "{{ patch_target_host }}"

- name: Copiar patch do share SMB para o host {{ patch_target_host }}
  ansible.windows.win_powershell:
    script: |
      $share = "\\192.168.0.115\certs\sql-patchs"
      $fullUser = "192.168.0.115\ansible"
      $password = "ans2025"
      $dest = "{{ windows_patch_stage_dir }}\{{ patch_package_name }}"

      $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
      $cred = New-Object System.Management.Automation.PSCredential($fullUser, $securePassword)

      $driveName = "PATCHSRC"

      try {
        if (Get-PSDrive -Name $driveName -ErrorAction SilentlyContinue) {
          Remove-PSDrive -Name $driveName -Force -ErrorAction SilentlyContinue
        }

        New-PSDrive -Name $driveName -PSProvider FileSystem -Root $share -Credential $cred -ErrorAction Stop | Out-Null

        $file = Get-ChildItem "PATCHSRC:\" -File -ErrorAction Stop |
          Where-Object { $_.Name -eq "{{ patch_package_name }}" } |
          Select-Object -First 1

        if (-not $file) {
          throw "Arquivo não encontrado no share: {{ patch_package_name }}"
        }

        Copy-Item -Path $file.FullName -Destination $dest -Force -ErrorAction Stop

        [pscustomobject]@{
          ok   = $true
          src  = $file.FullName
          dest = $dest
        } | ConvertTo-Json -Compress
      }
      finally {
        if (Get-PSDrive -Name $driveName -ErrorAction SilentlyContinue) {
          Remove-PSDrive -Name $driveName -Force -ErrorAction SilentlyContinue
        }
      }
  delegate_to: "{{ patch_target_host }}"
  register: _patch_copy
  changed_when: true

- name: Desbloquear patch no host {{ patch_target_host }}
  ansible.windows.win_powershell:
    script: |
      $patch = "{{ windows_patch_stage_dir }}\{{ patch_package_name }}"

      if (-not (Test-Path $patch)) {
        throw "Patch não encontrado para desbloqueio: $patch"
      }

      Unblock-File -Path $patch -ErrorAction SilentlyContinue
      Remove-Item -Path $patch -Stream Zone.Identifier -ErrorAction SilentlyContinue
      Remove-Item -Path $patch -Stream SmartScreen -ErrorAction SilentlyContinue

      Get-Item -Path $patch -Stream * -ErrorAction SilentlyContinue |
        Select-Object Stream, Length |
        ConvertTo-Json -Compress
  delegate_to: "{{ patch_target_host }}"
  register: _patch_unblock
  changed_when: true

- name: Validar streams do patch após desbloqueio
  ansible.windows.win_powershell:
    script: |
      $patch = "{{ windows_patch_stage_dir }}\{{ patch_package_name }}"

      if (-not (Test-Path $patch)) {
        throw "Patch não encontrado para validação de stream: $patch"
      }

      $streams = Get-Item -Path $patch -Stream * -ErrorAction SilentlyContinue |
        Select-Object Stream, Length

      @($streams) | ConvertTo-Json -Compress -Depth 4
  delegate_to: "{{ patch_target_host }}"
  register: _patch_streams
  changed_when: false

- name: Executar patch no host {{ patch_target_host }}
  ansible.windows.win_powershell:
    script: |
      $patch = '{{ windows_patch_stage_dir }}\{{ patch_package_name }}.exe'
      $args = '{{ patch_installer_args_effective }}'
      $timeoutSeconds = {{ patch_execution_timeout_seconds | default(5200) }}
      $pollSeconds = {{ patch_execution_poll_interval_seconds | default(30) }}
      $logRoot = '{{ sql_setup_bootstrap_log_root | default("C:\Program Files\Microsoft SQL Server\160\Setup Bootstrap\Log") }}'
      $killOnTimeout = [System.Convert]::ToBoolean('{{ patch_kill_on_timeout | default(false) | bool | string }}')

      function Get-MatchValue {
        param(
          [string]$Text,
          [string]$Pattern
        )

        if ([string]::IsNullOrWhiteSpace($Text)) {
          return ""
        }

        $m = [regex]::Match(
          $Text,
          $Pattern,
          [System.Text.RegularExpressions.RegexOptions]::IgnoreCase -bor
          [System.Text.RegularExpressions.RegexOptions]::Multiline
        )

        if ($m.Success -and $m.Groups.Count -gt 1) {
          return $m.Groups[1].Value.Trim()
        }

        return ""
      }

      function Get-LatestSqlSetupLogInfo {
        param(
          [string]$Root
        )

        $result = [ordered]@{
          RunDir               = ""
          SummaryPath          = ""
          DetailPath           = ""
          SummaryFinalResult   = ""
          SummaryExitCode      = ""
          SummaryFacilityCode  = ""
          SummaryErrorCode     = ""
          SummaryExitMessage   = ""
          SummaryStartTime     = ""
          SummaryEndTime       = ""
          SummaryRequestedAction = ""
          FailureCategory      = ""
          ImportantDetail      = ""
        }

        if (-not (Test-Path $Root)) {
          return [pscustomobject]$result
        }

        $runDir = Get-ChildItem -Path $Root -Directory -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1

        if ($null -eq $runDir) {
          return [pscustomobject]$result
        }

        $result.RunDir = $runDir.FullName

        $summary = Get-ChildItem -Path $runDir.FullName -Filter 'Summary.txt' -Recurse -File -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1

        if ($summary) {
          $result.SummaryPath = $summary.FullName
          $summaryText = Get-Content -Path $summary.FullName -Raw -ErrorAction SilentlyContinue

          $result.SummaryFinalResult = Get-MatchValue -Text $summaryText -Pattern 'Final result:\s*(.+)'
          $result.SummaryExitCode = Get-MatchValue -Text $summaryText -Pattern 'Exit code \(Decimal\):\s*(.+)'
          $result.SummaryFacilityCode = Get-MatchValue -Text $summaryText -Pattern 'Exit facility code:\s*(.+)'
          $result.SummaryErrorCode = Get-MatchValue -Text $summaryText -Pattern 'Exit error code:\s*(.+)'
          $result.SummaryExitMessage = Get-MatchValue -Text $summaryText -Pattern 'Exit message:\s*(.+)'
          $result.SummaryStartTime = Get-MatchValue -Text $summaryText -Pattern 'Start time:\s*(.+)'
          $result.SummaryEndTime = Get-MatchValue -Text $summaryText -Pattern 'End time:\s*(.+)'
          $result.SummaryRequestedAction = Get-MatchValue -Text $summaryText -Pattern 'Requested action:\s*(.+)'
        }

        $detail = Get-ChildItem -Path $runDir.FullName -Filter 'Detail.txt' -Recurse -File -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1

        if ($detail) {
          $result.DetailPath = $detail.FullName
          $detailLines = Get-Content -Path $detail.FullName -ErrorAction SilentlyContinue

          $failureCategoryLine = $detailLines |
            Where-Object { $_ -match 'SQL\.Setup\.FailureCategory\s*=' } |
            Select-Object -Last 1

          if ($failureCategoryLine) {
            $result.FailureCategory = (($failureCategoryLine -split '=', 2)[1]).Trim()
          }

          $importantLines = $detailLines |
            Where-Object {
              $_ -match 'SQL\.Setup\.FailureCategory' -or
              $_ -match 'Error result:' -or
              $_ -match 'Result facility code:' -or
              $_ -match 'Result error code:' -or
              $_ -match 'reboot' -or
              $_ -match 'restart' -or
              $_ -match 'RuleViolationFailure'
            } |
            Select-Object -Unique

          $result.ImportantDetail = (($importantLines | Select-Object -Last 12) -join "`n").Trim()
        }

        return [pscustomobject]$result
      }

      if (-not (Test-Path $patch)) {
        throw "Patch não encontrado no host: $patch"
      }

      $startedAt = Get-Date
      $deadline = $startedAt.AddSeconds($timeoutSeconds)

      $proc = Start-Process `
        -FilePath $patch `
        -ArgumentList $args `
        -PassThru `
        -ErrorAction Stop

      while ($true) {
        Start-Sleep -Seconds $pollSeconds
        $proc.Refresh()

        if ($proc.HasExited) {
          break
        }

        if ((Get-Date) -ge $deadline) {
          if ($killOnTimeout) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

          $logInfo = Get-LatestSqlSetupLogInfo -Root $logRoot

          throw (
            [pscustomobject]@{
              Timeout             = $true
              ExitCode            = -999999
              Pid                 = $proc.Id
              Patch               = $patch
              Args                = $args
              StartedAt           = $startedAt.ToString("s")
              FinishedAt          = ""
              DurationSec         = [int]((Get-Date) - $startedAt).TotalSeconds
              LogRunDir           = $logInfo.RunDir
              SummaryPath         = $logInfo.SummaryPath
              DetailPath          = $logInfo.DetailPath
              FinalResult         = $logInfo.SummaryFinalResult
              ExitFacilityCode    = $logInfo.SummaryFacilityCode
              ExitErrorCode       = $logInfo.SummaryErrorCode
              ExitMessage         = $logInfo.SummaryExitMessage
              SummaryStartTime    = $logInfo.SummaryStartTime
              SummaryEndTime      = $logInfo.SummaryEndTime
              RequestedAction     = $logInfo.SummaryRequestedAction
              FailureCategory     = $logInfo.FailureCategory
              ImportantDetail     = $logInfo.ImportantDetail
            } | ConvertTo-Json -Compress -Depth 6
          )
        }
      }

      Start-Sleep -Seconds 5
      $finishedAt = Get-Date
      $logInfo = Get-LatestSqlSetupLogInfo -Root $logRoot

      [pscustomobject]@{
        Timeout             = $false
        ExitCode            = $proc.ExitCode
        Pid                 = $proc.Id
        Patch               = $patch
        Args                = $args
        StartedAt           = $startedAt.ToString("s")
        FinishedAt          = $finishedAt.ToString("s")
        DurationSec         = [int]($finishedAt - $startedAt).TotalSeconds
        LogRunDir           = $logInfo.RunDir
        SummaryPath         = $logInfo.SummaryPath
        DetailPath          = $logInfo.DetailPath
        FinalResult         = $logInfo.SummaryFinalResult
        ExitFacilityCode    = $logInfo.SummaryFacilityCode
        ExitErrorCode       = $logInfo.SummaryErrorCode
        ExitMessage         = $logInfo.SummaryExitMessage
        SummaryStartTime    = $logInfo.SummaryStartTime
        SummaryEndTime      = $logInfo.SummaryEndTime
        RequestedAction     = $logInfo.SummaryRequestedAction
        FailureCategory     = $logInfo.FailureCategory
        ImportantDetail     = $logInfo.ImportantDetail
      } | ConvertTo-Json -Compress -Depth 6
  delegate_to: "{{ patch_target_host }}"
  register: _patch_exec
  changed_when: true
  become_method: enable
  failed_when: >-
    (
      (
        (_patch_exec.output | default([]) | join('') | trim | default('{}', true))
        | from_json
      ).ExitCode | int
    ) not in (patch_expected_return_codes | map('int') | list)

- name: Parse do resultado do patch
  ansible.builtin.set_fact:
    _patch_exec_json: >-
      {{
        (_patch_exec.output | default([]) | join('') | trim | default('{}', true))
        | from_json
      }}
  run_once: true

- name: Definir mensagem amigável do patch
  ansible.builtin.set_fact:
    _patch_exec_human_message: >-
      {{
        (
          'Patch bloqueado: reboot pendente antes da instalação.'
          if (_patch_exec_json.ExitErrorCode | default('') | string) == '3010'
          else
          'Patch aplicado na instância '
          ~ patch_instance_name_effective
          ~ ' com exit code '
          ~ ((_patch_exec_json.ExitCode | default(1) | int) | string)
          ~ ' em '
          ~ ((_patch_exec_json.DurationSec | default(0) | int) | string)
          ~ ' segundos.'
        )
      }}
  run_once: true

- name: Registrar ação de patch
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'actions': patch_report.actions + [ {
            'host': patch_target_host,
            'instance_name': (
              'ALLINSTANCES'
              if patch_mode_effective == 'allinstances'
              else patch_instance_name_effective
            ),
            'step': 'patch',
            'rc': (_patch_exec_json.ExitCode | default(1) | int),
            'message': _patch_exec_human_message,
            'summary_path': (_patch_exec_json.SummaryPath | default('')),
            'detail_path': (_patch_exec_json.DetailPath | default('')),
            'final_result': (_patch_exec_json.FinalResult | default('')),
            'exit_error_code': (_patch_exec_json.ExitErrorCode | default('')),
            'exit_message': (_patch_exec_json.ExitMessage | default('')),
            'failure_category': (_patch_exec_json.FailureCategory | default('')),
            'important_detail': (_patch_exec_json.ImportantDetail | default(''))
          } ]
        }, recursive=True)
      }}
  run_once: true
