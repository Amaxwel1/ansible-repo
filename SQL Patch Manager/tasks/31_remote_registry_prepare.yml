---
- name: Validar lista completa de hosts do AG
  ansible.builtin.assert:
    that:
      - ag_discovery.all_hosts | default([]) | length > 0
    fail_msg: "ag_discovery.all_hosts está vazio. A discovery do AG precisa acontecer antes do RemoteRegistry."
  run_once: true

- name: Garantir RemoteRegistry em todos os nós do AG
  ansible.windows.win_service:
    name: "{{ remote_registry_service_name }}"
    start_mode: "{{ remote_registry_startup_type | lower }}"
    state: started
  delegate_to: "{{ item }}"
  loop: "{{ ag_discovery.all_hosts }}"
  register: _remote_registry_results
  run_once: true

- name: Consolidar status do RemoteRegistry
  ansible.builtin.set_fact:
    remote_registry_status_by_host: >-
      {{
        remote_registry_status_by_host | default({})
        | combine({
            item.item: {
              'changed': item.changed | default(false),
              'state': 'started',
              'start_mode': remote_registry_startup_type,
              'failed': item.failed | default(false),
              'msg': item.msg | default('')
            }
          }, recursive=True)
      }}
  loop: "{{ _remote_registry_results.results | default([]) }}"
  run_once: true

- name: Publicar RemoteRegistry no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'precheck': patch_report.precheck | combine({
            'remote_registry_status_by_host': remote_registry_status_by_host
          }, recursive=True)
        }, recursive=True)
      }}
  run_once: true
