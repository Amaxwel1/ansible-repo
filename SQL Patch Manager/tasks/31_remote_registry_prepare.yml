---
- name: Validar lista completa de hosts do AG
  ansible.builtin.assert:
    that:
      - ag_discovery.all_hosts | default([]) | length > 0
    fail_msg: "ag_discovery.all_hosts está vazio. A discovery do AG precisa acontecer antes do RemoteRegistry."
  run_once: true

- name: Garantir RemoteRegistry em todos os nós do AG
  ansible.windows.win_service:
    name: "{{ remote_registry_service_name }}"
    start_mode: "{{ remote_registry_startup_type | lower }}"
    state: started
  delegate_to: "{{ remote_registry_host }}"
  loop: "{{ ag_discovery.all_hosts }}"
  loop_control:
    loop_var: remote_registry_host
    label: "{{ remote_registry_host }}"
  register: _remote_registry_results
  run_once: true

- name: Inicializar status consolidado do RemoteRegistry
  ansible.builtin.set_fact:
    remote_registry_status_by_host: {}
  run_once: true

- name: Consolidar status do RemoteRegistry
  ansible.builtin.set_fact:
    remote_registry_status_by_host: >-
      {{
        remote_registry_status_by_host | combine({
          _remote_registry_host: {
            'changed': remote_registry_result.changed | default(false),
            'state': (
              remote_registry_result.state
              | default(
                  remote_registry_result.status
                  | default('started')
                )
            ),
            'start_mode': (
              remote_registry_result.start_mode
              | default(remote_registry_startup_type)
            ),
            'failed': remote_registry_result.failed | default(false),
            'msg': remote_registry_result.msg | default('')
          }
        }, recursive=True)
      }}
  vars:
    _remote_registry_host: >-
      {{
        remote_registry_result.remote_registry_host
        | default(remote_registry_result.item | default('host-indefinido'))
      }}
  loop: "{{ _remote_registry_results.results | default([]) }}"
  loop_control:
    loop_var: remote_registry_result
    label: >-
      {{
        remote_registry_result.remote_registry_host
        | default(remote_registry_result.item | default('host-indefinido'))
      }}
  run_once: true

- name: Publicar RemoteRegistry no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'precheck': patch_report.precheck | combine({
            'remote_registry_status_by_host': remote_registry_status_by_host
          }, recursive=True)
        }, recursive=True)
      }}
  run_once: true
