---
- name: Coletar versão após patch nas instâncias standalone
  ansible.windows.win_powershell:
    script: |
      Import-Module "{{ sql_powershell_module_name }}" -ErrorAction Stop
      $serverInstance = "{{ single_postcheck_target.connection_target }}"
      $row = Invoke-Sqlcmd `
        -ServerInstance $serverInstance `
        -TrustServerCertificate `
        -QueryTimeout {{ sql_query_timeout_seconds }} `
        -Query "SELECT @@VERSION AS SqlVersion;" `
        -ErrorAction Stop | Select-Object -First 1

      ([string]$row.SqlVersion).Trim()
  delegate_to: "{{ single_postcheck_target.host }}"
  loop: "{{ single_instance_targets }}"
  loop_control:
    loop_var: single_postcheck_target
    label: "{{ single_postcheck_target.host }} / {{ single_postcheck_target.instance_name }}"
  register: _sql_version_after_single
  changed_when: false
  run_once: true
  when: execution_topology == 'single'

- name: Inicializar estrutura de pós-check single
  ansible.builtin.set_fact:
    single_postcheck_rows: []
  when: execution_topology == 'single'
  run_once: true

- name: Consolidar pós-check single por instância
  ansible.builtin.set_fact:
    single_postcheck_rows: >-
      {{
        single_postcheck_rows + [ {
          'host': _single_postcheck_target.host,
          'instance_name': _single_postcheck_target.instance_name,
          'connection_target': _single_postcheck_target.connection_target,
          'version_after': (single_postcheck_result.output | default([]) | join('') | trim),
          'version_after_rc': (0 if not (single_postcheck_result.failed | default(false)) and ((single_postcheck_result.output | default([]) | join('') | trim | length) > 0) else 1)
        } ]
      }}
  vars:
    _single_postcheck_target: "{{ single_postcheck_result.single_postcheck_target }}"
  loop: "{{ _sql_version_after_single.results | default([]) }}"
  loop_control:
    loop_var: single_postcheck_result
    label: "{{ single_postcheck_result.single_postcheck_target.host }} / {{ single_postcheck_result.single_postcheck_target.instance_name }}"
  when: execution_topology == 'single'
  run_once: true

- name: Coletar versão após patch nos nós do AG
  ansible.windows.win_powershell:
    script: |
      Import-Module "{{ sql_powershell_module_name }}" -ErrorAction Stop
      $serverInstance = "{{ ag_postcheck_row.ServerName }}"
      $row = Invoke-Sqlcmd `
        -ServerInstance $serverInstance `
        -TrustServerCertificate `
        -QueryTimeout {{ sql_query_timeout_seconds }} `
        -Query "SELECT @@VERSION AS SqlVersion;" `
        -ErrorAction Stop | Select-Object -First 1

      ([string]$row.SqlVersion).Trim()
  delegate_to: "{{ ag_postcheck_row.InventoryHost }}"
  loop: "{{ ag_discovery.topology_rows }}"
  loop_control:
    loop_var: ag_postcheck_row
    label: "{{ ag_postcheck_row.InventoryHost }}"
  register: _sql_version_after_ag
  changed_when: false
  run_once: true
  when: execution_topology == 'ag_cluster'

- name: Inicializar estrutura de pós-check AG
  ansible.builtin.set_fact:
    sql_postcheck_by_host: {}
  when: execution_topology == 'ag_cluster'
  run_once: true

- name: Consolidar pós-check AG por host
  ansible.builtin.set_fact:
    sql_postcheck_by_host: >-
      {{
        sql_postcheck_by_host | combine({
          _ag_postcheck_row.InventoryHost: {
            'server_name': _ag_postcheck_row.ServerName,
            'version_after': (ag_postcheck_result.output | default([]) | join('') | trim),
            'version_after_rc': (0 if not (ag_postcheck_result.failed | default(false)) and ((ag_postcheck_result.output | default([]) | join('') | trim | length) > 0) else 1)
          }
        }, recursive=True)
      }}
  vars:
    _ag_postcheck_row: "{{ ag_postcheck_result.ag_postcheck_row }}"
  loop: "{{ _sql_version_after_ag.results | default([]) }}"
  loop_control:
    loop_var: ag_postcheck_result
    label: "{{ ag_postcheck_result.ag_postcheck_row.InventoryHost }}"
  when: execution_topology == 'ag_cluster'
  run_once: true

- name: Publicar pós-check single no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'postcheck': patch_report.postcheck | combine({
            'single_postcheck_rows': single_postcheck_rows
          }, recursive=True)
        }, recursive=True)
      }}
  when: execution_topology == 'single'
  run_once: true

- name: Publicar pós-check AG no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'postcheck': patch_report.postcheck | combine({
            'sql_postcheck_by_host': sql_postcheck_by_host,
            'ag_final_primary_host': ag_discovery.primary_host,
            'ag_final_secondary_hosts': ag_discovery.secondary_hosts,
            'ag_final_topology_rows': ag_discovery.topology_rows
          }, recursive=True)
        }, recursive=True)
      }}
  when: execution_topology == 'ag_cluster'
  run_once: true
