---
- name: Garantir diretório de montagem do CIFS no controller
  ansible.builtin.file:
    path: "{{ patch_cifs_mount_path }}"
    state: directory
    mode: "0755"
  become: true
  become_user: root
  delegate_to: 192.168.122.34

- name: Criar arquivo de credencial CIFS no controller
  ansible.builtin.copy:
    dest: "{{ _patch_cred_file }}"
    content: "{{ patch_cifs_password }}"
    mode: "0600"
  become: true
  become_user: root
  delegate_to: 192.168.122.34

- name: Montar CIFS no controller
  become: true
  become_user: root
  ansible.builtin.shell: |
    mount "{{ patch_cifs_share | lower }}" "{{ patch_cifs_mount_path }}" \
      -o username={{ patch_cifs_username }},password=`cat {{ _patch_cred_file }}`,domain={{ patch_cifs_domain }},rw,vers=3.0
  delegate_to: 192.168.122.34
  register: _mount_out
  failed_when: >-
    _mount_out.rc != 0 and
    ('already mounted' not in (((_mount_out.stderr | default('')) ~ ' ' ~ (_mount_out.stdout | default(''))) | lower))
  changed_when: _mount_out.rc == 0
  no_log: true

- name: Localizar pacote de patch no CIFS
  ansible.builtin.find:
    paths: "{{ patch_cifs_root }}"
    recurse: true
    patterns:
      - "{{ patch_package_name }}"
  delegate_to: 192.168.122.34
  register: patch_package_found

- name: Falhar se o patch não existir
  ansible.builtin.fail:
    msg: "Patch {{ patch_package_name }} não encontrado em {{ patch_cifs_root }}"
  when: patch_package_found.files | length == 0

- name: Definir caminho local do patch no controller
  ansible.builtin.set_fact:
    patch_package_local_path: "{{ patch_package_found.files[0].path }}"

- name: Registrar patch encontrado no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'discovery': patch_report.discovery | combine({
            'patch_package_local_path': patch_package_local_path,
            'patch_package_size': (patch_package_found.files[0].size | default(0))
          }, recursive=True)
        }, recursive=True)
      }}
