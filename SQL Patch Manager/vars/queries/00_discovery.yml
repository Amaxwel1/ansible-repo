
---
# Query local para descobrir se o host é standalone ou membro de AG
sql_query_local_discovery: |
  SET NOCOUNT ON;
  IF SERVERPROPERTY('IsHadrEnabled') = 1
     AND EXISTS (SELECT 1 FROM sys.dm_hadr_availability_replica_states WHERE is_local = 1)
  BEGIN
      SELECT TOP (1)
          CAST(SERVERPROPERTY('ServerName') AS nvarchar(256)) AS ServerName,
          CAST(SERVERPROPERTY('MachineName') AS nvarchar(256)) AS MachineName,
          COALESCE(CAST(SERVERPROPERTY('InstanceName') AS nvarchar(256)), 'MSSQLSERVER') AS InstanceName,
          CAST(SERVERPROPERTY('IsHadrEnabled') AS int) AS IsHadrEnabled,
          ag.name AS AGName,
          ars.role_desc AS RoleName,
          ar.availability_mode_desc AS AvailabilityMode,
          ars.connected_state_desc AS ConnectedState,
          ars.operational_state_desc AS OperationalState,
          ars.synchronization_health_desc AS SyncHealth
      FROM sys.dm_hadr_availability_replica_states ars
      JOIN sys.availability_replicas ar
        ON ars.replica_id = ar.replica_id
      JOIN sys.availability_groups ag
        ON ars.group_id = ag.group_id
      WHERE ars.is_local = 1;
  END
  ELSE
  BEGIN
      SELECT
          CAST(SERVERPROPERTY('ServerName') AS nvarchar(256)) AS ServerName,
          CAST(SERVERPROPERTY('MachineName') AS nvarchar(256)) AS MachineName,
          COALESCE(CAST(SERVERPROPERTY('InstanceName') AS nvarchar(256)), 'MSSQLSERVER') AS InstanceName,
          CAST(SERVERPROPERTY('IsHadrEnabled') AS int) AS IsHadrEnabled,
          CAST('' AS nvarchar(256)) AS AGName,
          CAST('STANDALONE' AS nvarchar(60)) AS RoleName,
          CAST('' AS nvarchar(60)) AS AvailabilityMode,
          CAST('' AS nvarchar(60)) AS ConnectedState,
          CAST('ONLINE' AS nvarchar(60)) AS OperationalState,
          CAST('' AS nvarchar(60)) AS SyncHealth;
  END

# Em qualquer membro do AG, esta query ajuda a descobrir quem é a PRIMARY atual
sql_query_ag_group_state: |
  SET NOCOUNT ON;
  SELECT
      ag.name AS AGName,
      ags.primary_replica AS PrimaryReplica,
      ags.synchronization_health_desc AS GroupSyncHealth
  FROM sys.availability_groups ag
  JOIN sys.dm_hadr_availability_group_states ags
    ON ag.group_id = ags.group_id
  ORDER BY ag.name;

# Deve ser executada na PRIMARY para visão consolidada de todas as réplicas
sql_query_ag_topology: |
  SET NOCOUNT ON;
  SELECT
      ag.name AS AGName,
      ar.replica_server_name AS ServerName,
      CASE
          WHEN CHARINDEX('\', ar.replica_server_name) > 0
            THEN LEFT(ar.replica_server_name, CHARINDEX('\', ar.replica_server_name) - 1)
          ELSE ar.replica_server_name
      END AS MachineName,
      ars.role_desc AS RoleName,
      ar.availability_mode_desc AS AvailabilityMode,
      ar.failover_mode_desc AS FailoverMode,
      ars.connected_state_desc AS ConnectedState,
      ars.synchronization_health_desc AS SyncHealth
  FROM sys.availability_groups ag
  JOIN sys.availability_replicas ar
    ON ag.group_id = ar.group_id
  LEFT JOIN sys.dm_hadr_availability_replica_states ars
    ON ar.replica_id = ars.replica_id
  ORDER BY
      CASE WHEN ars.role_desc = 'PRIMARY' THEN 0 ELSE 1 END,
      ar.replica_server_name;
