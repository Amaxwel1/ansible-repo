
---
sql_query_health_replicas: |
  SELECT C.name as AGName,
         CS.replica_server_name as ServerName,
         RS.role_desc as RoleName,
         RS.synchronization_health_desc as SyncStatus
  FROM sys.availability_groups_cluster AS C
  INNER JOIN sys.dm_hadr_availability_replica_cluster_states AS CS
    ON CS.group_id = C.group_id
  INNER JOIN sys.dm_hadr_availability_replica_states AS RS
    ON RS.replica_id = CS.replica_id
  ORDER BY RS.role_desc;

sql_query_health_databases: |
  SELECT ag.name AS AGName,
         ar.replica_server_name AS ServerName,
         ars.role_desc AS RoleName,
         DB_NAME(drs.database_id) AS DatabaseName,
         drs.synchronization_state_desc,
         drs.synchronization_health_desc,
         drs.database_state_desc,
         drs.is_suspended
  FROM sys.dm_hadr_database_replica_states drs
  JOIN sys.availability_replicas ar
    ON drs.replica_id = ar.replica_id
  JOIN sys.availability_groups ag
    ON drs.group_id = ag.group_id
  JOIN sys.dm_hadr_availability_replica_states ars
    ON drs.replica_id = ars.replica_id
  ORDER BY ar.replica_server_name, DatabaseName;
