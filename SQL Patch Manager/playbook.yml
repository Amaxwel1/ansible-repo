---
- name: SQL Patch Manager
  hosts: localhost
  gather_facts: false

  vars_files:
    - defaults/main.yml

  pre_tasks:
    - name: Carregar queries SQL
      ansible.builtin.include_vars:
        dir: vars/queries
        extensions: ["yml"]
      run_once: true

  tasks:
    - name: Fluxo completo de patch SQL Server
      block:
        - name: 00 - Validar entradas obrigatórias
          ansible.builtin.include_tasks: tasks/00_validate_inputs.yml

        - name: 10 - Montar plano de execução
          ansible.builtin.include_tasks: tasks/10_plan_targets.yml

        - name: 11 - Registrar hosts do survey
          ansible.builtin.include_tasks: tasks/11_register_seed_hosts.yml

        - name: 20 - Montar CIFS e localizar patch
          ansible.builtin.include_tasks: tasks/20_mount_cifs.yml
          when: not (sql_precheck_only_bool | bool)

        - name: 30 - Descobrir topologia SQL / AG
          ansible.builtin.include_tasks: tasks/30_discover_sql_topology.yml

        - name: 34 - Registrar nós descobertos do AG
          ansible.builtin.include_tasks: tasks/34_register_ag_hosts.yml
          when: execution_topology == 'ag_cluster'

        - name: 31 - Preparar Remote Registry em cluster
          ansible.builtin.include_tasks: tasks/31_remote_registry_prepare.yml
          when: execution_topology == 'ag_cluster'

        - name: 32 - Precheck standalone
          ansible.builtin.include_tasks: tasks/32_precheck_single.yml
          when: execution_topology == 'single'

        - name: 33 - Precheck AG
          ansible.builtin.include_tasks: tasks/33_precheck_ag.yml
          when: execution_topology == 'ag_cluster'

        - name: 40 - Aplicar patch standalone
          ansible.builtin.include_tasks: tasks/40_patch_single.yml
          when:
            - execution_topology == 'single'
            - not (sql_precheck_only_bool | bool)

        - name: 45 - Aguardar instâncias standalone ficarem prontas
          ansible.builtin.include_tasks: tasks/45_wait_single_instances_ready.yml
          when:
            - execution_topology == 'single'
            - not (sql_precheck_only_bool | bool)

        - name: 43 - Aplicar patch AG
          ansible.builtin.include_tasks: tasks/43_patch_ag.yml
          when:
            - execution_topology == 'ag_cluster'
            - not (sql_precheck_only_bool | bool)

        - name: 50 - Pós-check consolidado
          ansible.builtin.include_tasks: tasks/50_postcheck_sql.yml

        - name: 55 - Reboot após validação final
          ansible.builtin.include_tasks: tasks/55_reboot_after_validation.yml
          when:
            - not (sql_precheck_only_bool | bool)
            - patch_reboot_after_validation | default(false) | bool

        - name: 56 - Pós-check final após reboot
          ansible.builtin.include_tasks: tasks/50_postcheck_sql.yml
          when:
            - not (sql_precheck_only_bool | bool)
            - patch_reboot_after_validation | default(false) | bool

        - name: 60 - Montar report final
          ansible.builtin.include_tasks: tasks/60_build_report.yml

      rescue:
        - name: Capturar contexto da falha
          ansible.builtin.set_fact:
            _fail_task: "{{ ansible_failed_task.name | default('—') }}"
            _fail_action: "{{ ansible_failed_task.action | default('—') }}"
            _fail_msg: >-
              {{
                ansible_failed_result.msg
                | default(ansible_failed_result | to_nice_json | default('Erro não mapeado'))
              }}

        - name: Montar HTML de falha
          ansible.builtin.set_fact:
            report_html: |
              <style>
              table, th, td { border:1px solid #a2a2a2; border-collapse:collapse; padding:8px; }
              th { background:#e0e0e0; }
              pre { white-space:pre-wrap; }
              </style>
              <h2 style="color:#b00020">Falha na automação SQL Patch Manager</h2>
              <h3>Contexto da falha</h3>
              <table>
                <tr><th>Task</th><td>{{ _fail_task }}</td></tr>
                <tr><th>Ação</th><td>{{ _fail_action }}</td></tr>
                <tr><th>Mensagem</th><td><pre>{{ _fail_msg }}</pre></td></tr>
              </table>
              <h3>Parâmetros de entrada</h3>
              <table>
                <tr><th>Topologia</th><td>{{ sql_topology | default('—') }}</td></tr>
                <tr><th>Hosts do survey</th><td>{{ survey_hosts | default('—') }}</td></tr>
                <tr><th>Expandir AG</th><td>{{ ag_expand_to_all_nodes | default(false) }}</td></tr>
                <tr><th>Patch</th><td>{{ patch_package_name | default('—') }}</td></tr>
                <tr><th>Instância</th><td>{{ sql_instance_name | default('—') }}</td></tr>
              </table>

        - name: Publicar para e-mail (falha)
          ansible.builtin.set_stats:
            data:
              send_mail_subject: "Ansible-Report (FALHA) - SQL Patch Manager - {{ sql_environment | upper }} - Job #{{ awx_job_id | default('local') }}"
              send_mail_body: "{{ report_html }}"
              send_mail_cifs: "{{ send_mail_cifs }}"
              send_mail_cifs_path: "{{ send_mail_cifs_path }}"
              send_mail_cifs_address: "{{ send_mail_cifs_address }}"

        - name: Aviso de falha tratada
          ansible.builtin.debug:
            msg: "Falha tratada: {{ _fail_task }} / {{ _fail_action }}. O e-mail de falha será enviado."

      always:
        - name: Desmontar CIFS no controller
          ansible.builtin.command: "umount '{{ patch_cifs_mount_path }}'"
          delegate_to: 192.168.122.34
          register: _umount_out
          become: true
          become_user: root
          failed_when: false
          changed_when: _umount_out.rc == 0

        - name: Remover credencial temporária do CIFS
          ansible.builtin.file:
            path: "{{ _patch_cred_file }}"
            state: absent
          delegate_to: 192.168.122.34
          become: true
          become_user: root
          failed_when: false
          changed_when: false
