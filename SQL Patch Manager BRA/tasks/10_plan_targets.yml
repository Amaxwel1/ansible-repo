---
- name: Definir topologia efetiva
  ansible.builtin.set_fact:
    execution_topology: "{{ sql_topology_normalized }}"

- name: Normalizar survey_hosts
  ansible.builtin.set_fact:
    execution_hosts: >-
      {{
        (
          survey_hosts
          if (survey_hosts is sequence and survey_hosts is not string)
          else (
            survey_hosts
            | string
            | regex_replace('\s+', '')
            | regex_replace(',+', ',')
            | trim
            | split(',')
          )
        )
        | map('string')
        | map('trim')
        | reject('equalto','')
        | unique
        | list
      }}

- name: Validar que há hosts elegíveis
  ansible.builtin.assert:
    that:
      - execution_hosts | length > 0
    fail_msg: "Nenhum host elegível foi identificado em survey_hosts."

- name: Inicializar hosts de pós-check
  ansible.builtin.set_fact:
    postcheck_hosts: "{{ execution_hosts | list }}"

- name: Registrar plano inicial no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'execution': patch_report.execution | combine({
            'execution_hosts': execution_hosts
          }, recursive=True)
        }, recursive=True)
      }}
