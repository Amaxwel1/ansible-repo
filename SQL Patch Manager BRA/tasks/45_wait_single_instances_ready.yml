---
- name: Validar instâncias standalone para espera final
  ansible.builtin.assert:
    that:
      - single_instance_targets is defined
      - single_instance_targets | length > 0
    fail_msg: "Nenhuma instância standalone encontrada para espera final."
  run_once: true

- name: Aguardar instâncias standalone ficarem prontas
  ansible.windows.win_powershell:
    script: |
      Import-Module "{{ sql_powershell_module_name }}" -ErrorAction Stop

      $serverInstance = "{{ item.connection_target }}"
      $timeoutSeconds = {{ single_instance_wait_timeout_seconds }}
      $pollSeconds = {{ single_instance_poll_interval_seconds }}
      $deadline = (Get-Date).AddSeconds($timeoutSeconds)
      $lastError = ""

      while ((Get-Date) -lt $deadline) {
        try {
          $row = Invoke-Sqlcmd `
            -ServerInstance $serverInstance `
            -QueryTimeout {{ sql_query_timeout_seconds }} `
            -Query "SELECT @@SERVERNAME AS ServerName;" `
            -ErrorAction Stop | Select-Object -First 1

          if (([string]$row.ServerName).Trim().Length -gt 0) {
            [pscustomobject]@{
              WaitResult      = "READY"
              Host            = "{{ item.host }}"
              InstanceName    = "{{ item.instance_name }}"
              ServerInstance  = $serverInstance
              WaitTimeoutSec  = $timeoutSeconds
              PollIntervalSec = $pollSeconds
            } | ConvertTo-Json -Compress -Depth 5
            exit 0
          }
        }
        catch {
          $lastError = $_.Exception.Message
        }

        Start-Sleep -Seconds $pollSeconds
      }

      throw (
        [pscustomobject]@{
          WaitResult      = "TIMEOUT"
          Host            = "{{ item.host }}"
          InstanceName    = "{{ item.instance_name }}"
          ServerInstance  = $serverInstance
          WaitTimeoutSec  = $timeoutSeconds
          PollIntervalSec = $pollSeconds
          LastError       = $lastError
        } | ConvertTo-Json -Compress -Depth 8
      )
  delegate_to: "{{ item.host }}"
  loop: "{{ single_instance_targets }}"
  register: _single_wait_ready
  changed_when: false
  run_once: true

- name: Publicar espera de single no report
  ansible.builtin.set_fact:
    patch_report: >-
      {{
        patch_report | combine({
          'actions': patch_report.actions + [ {
            'host': item.item.host,
            'instance_name': item.item.instance_name,
            'step': 'wait_single_instance_ready',
            'rc': 0,
            'message': 'Instância ' ~ item.item.instance_name ~ ' pronta para pós-check.'
          } ]
        }, recursive=True)
      }}
  loop: "{{ _single_wait_ready.results | default([]) }}"
  when: not (item.failed | default(false))
  run_once: true
