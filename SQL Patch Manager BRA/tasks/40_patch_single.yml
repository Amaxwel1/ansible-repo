---
- name: Validar plano single calculado
  ansible.builtin.assert:
    that:
      - single_patch_plan_rows is defined
      - single_patch_plan_rows | length > 0
    fail_msg: "Plano de patch standalone não foi calculado. Execute 30_discover_sql_topology.yml antes de 40_patch_single.yml."
  run_once: true

- name: Aplicar patch nos hosts standalone
  ansible.builtin.include_tasks: 41_patch_one_host.yml
  vars:
    patch_target_host: "{{ item.host }}"
    patch_target_instance: "{{ item.patch_instance_name }}"
    patch_target_patch_mode: "{{ item.patch_mode }}"
    patch_target_instance_names: "{{ item.instance_names }}"
  loop: "{{ single_patch_plan_rows }}"
  run_once: true
