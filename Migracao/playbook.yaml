                            <td style="border:1px solid #d1d5db; padding:9px;">{{ aplication_migration | join('<br />') }}</td>
                          </tr>

                          {% if 'PAGINAS DE MANUTENCAO' in aplication_migration %}
                          <tr>
                            <th style="background:#f3f4f6; border:1px solid #d1d5db; padding:9px; text-align:left;">Páginas de manutenção</th>
                            <td style="border:1px solid #d1d5db; padding:9px;">Objetos especiais de páginas de manutenção considerados na execução.</td>
                          </tr>
                          {% endif %}

                          {% if 'SINV' in aplication_migration %}
