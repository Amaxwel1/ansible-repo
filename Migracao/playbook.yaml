                        {% if sequencial_list is defined and sequencial_list | length > 0 %}
                        <h2 style="margin:0 0 12px 0; font-size:18px; color:#111827;">Migração sequencial</h2>

                        <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse; margin-bottom:24px; font-size:13px;">
