---
- name: Prepare KUBECONFIG/log and labels
  ansible.builtin.set_fact:
    _kcfg: "{{ lookup('env','KUBECONFIG') | default(paths.kubeconfig | default(''), true) }}"
    _log: "{{ log_file }}"
    _timeouts_file: "{{ tmpdir }}/timeouts_async.log"
    _exec_label: "ansible.restart/by={{ (executor_user | string) | replace(' ', '_') | lower }}"

- name: Detect type if auto
  when: restart_strategy == 'auto'
  ansible.builtin.shell: |
    set -eo pipefail
    export KUBECONFIG="{{ _kcfg }}"
    ns="{{ ns }}"; name="{{ _name }}"; type="{{ _type }}"
    if [ "$type" = "dc" ]; then echo "dc"; exit 0; fi
    if [ "$type" = "deploy" ]; then echo "deploy"; exit 0; fi
    if oc -n "$ns" get dc "$name" -o name >/dev/null 2>&1; then echo "dc"; exit 0; fi
    if oc -n "$ns" get deploy "$name" -o name >/dev/null 2>&1; then echo "deploy"; exit 0; fi
    echo "absent"
  args: { executable: /bin/bash }
  register: det
  changed_when: false

- name: Fail if object not found (auto)
  when: (restart_strategy == 'auto') and (det.stdout | trim == 'absent')
  ansible.builtin.fail:
    msg: "Objeto {{ ns }}/{{ _name }} não encontrado (dc ou deploy)."

- name: Set selected type
  ansible.builtin.set_fact:
    selected_type: >-
      {{
        (restart_strategy == 'dc_rollout_latest')      | ternary('dc',
        (restart_strategy == 'deploy_rollout_restart') | ternary('deploy',
        (restart_strategy == 'bounce_scale')           | ternary('bounce',
          (det.stdout | default(_type | default(''))) )))
      }}

# ===== Bounce (scale down/up) =====
- name: Bounce scale restart (dc/deploy without rollout)
  when: selected_type == 'bounce'
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ _kcfg }}"
    ns="{{ ns }}"
    name="{{ _name }}"
    given_type="{{ _type | default('') }}"
    to_up="{{ rollout_timeout_seconds | int }}"
    to_zero="{{ scale_bounce_wait_zero | int }}"

    num_or_zero() {
      case "${1:-}" in
        ''|*[!0-9]*) echo 0 ;;
        *) echo "$1" ;;
      esac
    }

    detect_kind() {
      if [ "$given_type" = "dc" ] || [ "$given_type" = "deploy" ]; then
        echo "$given_type"
        return 0
      fi
      if oc -n "$ns" get dc "$name" -o name >/dev/null 2>&1; then
        echo "dc"
        return 0
      fi
      if oc -n "$ns" get deploy "$name" -o name >/dev/null 2>&1; then
        echo "deploy"
        return 0
      fi
      echo "absent"
      return 0
    }

    wait_ready_count() {
      local kind="$1"
      local target="$2"
      local timeout="$3"
      local mode="$4"
      local elapsed=0
      local cur=""

      while [ "$elapsed" -lt "$timeout" ]; do
        cur="$(oc -n "$ns" get "$kind" "$name" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo '')"
        cur="$(num_or_zero "$cur")"

        if [ "$mode" = "zero" ]; then
          [ "$cur" -eq 0 ] && return 0
        else
          [ "$cur" -ge "$target" ] && return 0
        fi

        sleep 5
        elapsed=$((elapsed + 5))
      done

      return 1
    }

    label_rc_of_dc() {
      local rc
      rc="$(oc -n "$ns" get rc \
            -l "openshift.io/deployment-config.name=$name" \
            --sort-by=.metadata.creationTimestamp \
            -o name 2>/dev/null | tail -n1 || true)"
      [ -n "$rc" ] || return 0
      oc -n "$ns" label "$rc" 'ansible.mca/restarted-by=ansible' --overwrite || true
      oc -n "$ns" label "$rc" "{{ _exec_label }}" --overwrite || true
    }

    label_rs_of_deploy() {
      local rsn
      rsn="$(oc -n "$ns" get rs \
            -o custom-columns=NAME:.metadata.name,OWNER:.metadata.ownerReferences[0].name \
            --no-headers 2>/dev/null \
            | awk -v d="$name" '$2==d{last=$1} END{print last}')"

      if [ -z "$rsn" ]; then
        local rev
        rev="$(oc -n "$ns" get deploy "$name" -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || true)"
        if [ -n "$rev" ]; then
          rsn="$(oc -n "$ns" get rs \
                -o custom-columns=NAME:.metadata.name,OWNER:.metadata.ownerReferences[0].name,REV:.metadata.annotations.deployment\\.kubernetes\\.io/revision \
                --no-headers 2>/dev/null \
                | awk -v d="$name" -v r="$rev" '$2==d && $3==r{last=$1} END{print last}')"
        fi
      fi

      [ -n "$rsn" ] || return 0
      oc -n "$ns" label "rs/$rsn" 'ansible.mca/restarted-by=ansible' --overwrite || true
      oc -n "$ns" label "rs/$rsn" "{{ _exec_label }}" --overwrite || true
    }

    kind="$(detect_kind)"
    if [ "$kind" = "absent" ]; then
      echo "[$(date +%T)] BOUNCE :: {{ ns }}/{{ _name }} -> objeto não encontrado." >> "{{ _log }}"
      echo "{{ ns }};auto;{{ _name }};not_found" >> "{{ _timeouts_file }}"
      exit 0
    fi

    orig="$(oc -n "$ns" get "$kind" "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo '')"
    orig="$(num_or_zero "$orig")"

    if [ "$orig" -eq 0 ]; then
      echo "[$(date +%T)] SKIP ${kind^^} {{ ns }}/{{ _name }} (replicas=0)" >> "{{ _log }}"
      exit 0
    fi

    {
      echo "[$(date +%T)] BOUNCE :: $kind {{ ns }}/{{ _name }} -> scale down to 0"
      if ! oc -n "{{ ns }}" scale "$kind/{{ _name }}" --replicas=0; then
        echo "{{ ns }};$kind;{{ _name }};scale_down_failed" >> "{{ _timeouts_file }}"
        exit 0
      fi

      echo "[$(date +%T)] BOUNCE :: $kind {{ ns }}/{{ _name }} -> wait readyReplicas=0 (${to_zero}s)"
      if ! wait_ready_count "$kind" 0 "$to_zero" zero; then
        echo "{{ ns }};$kind;{{ _name }};bounce_zero_timeout" >> "{{ _timeouts_file }}"
      fi

      echo "[$(date +%T)] BOUNCE :: $kind {{ ns }}/{{ _name }} -> scale up to $orig"
      if ! oc -n "{{ ns }}" scale "$kind/{{ _name }}" --replicas="$orig"; then
        echo "{{ ns }};$kind;{{ _name }};scale_up_failed" >> "{{ _timeouts_file }}"
        exit 0
      fi

      echo "[$(date +%T)] BOUNCE :: $kind {{ ns }}/{{ _name }} -> wait readyReplicas>=$orig (${to_up}s)"
      if ! wait_ready_count "$kind" "$orig" "$to_up" up; then
        echo "{{ ns }};$kind;{{ _name }};bounce_up_timeout" >> "{{ _timeouts_file }}"
      fi

      if [ "$kind" = "dc" ]; then
        label_rc_of_dc || true
      else
        label_rs_of_deploy || true
      fi
    } >> "{{ _log }}" 2>&1
  args:
    executable: /bin/bash
  register: bounce_restart
  changed_when: true
  failed_when: false

# ===== DC =====
- name: DC rollout latest
  when: selected_type == 'dc'
  ansible.builtin.shell: |
    set -eo pipefail
    export KUBECONFIG="{{ _kcfg }}"
    {
      echo "[$(date +%T)] DC  :: {{ ns }}/{{ _name }} -> rollout latest";
      oc rollout latest "dc/{{ _name }}" -n "{{ ns }}";
      echo "[$(date +%T)] DC  :: {{ ns }}/{{ _name }} -> rollout status ({{ rollout_timeout_seconds }}s)";
      if ! oc rollout status "dc/{{ _name }}" -n "{{ ns }}" --watch --timeout="{{ rollout_timeout_seconds }}s"; then
        echo "{{ ns }};dc;{{ _name }};timeout" >> "{{ _timeouts_file }}";
      fi
      rc=$(oc -n "{{ ns }}" get rc -l openshift.io/deployment-config.name="{{ _name }}" --sort-by=.metadata.creationTimestamp -o name | tail -n1 || true)
      if [ -n "$rc" ]; then
        oc -n "{{ ns }}" label "$rc" 'ansible.mca/restarted-by=ansible' --overwrite
        oc -n "{{ ns }}" label "$rc" "{{ _exec_label }}" --overwrite
      fi
    } >> "{{ _log }}" 2>&1
  args: { executable: /bin/bash }
  register: dc_roll
  changed_when: "'triggered' in (dc_roll.stdout | default('')) or dc_roll.rc == 0"
  failed_when: false

# ===== Deployment =====
- name: Deployment rollout restart
  when: selected_type == 'deploy'
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ _kcfg }}"
    {
      echo "[$(date +%T)] DEP :: {{ ns }}/{{ _name }} -> rollout restart";
      oc rollout restart  "deploy/{{ _name }}" -n "{{ ns }}";
      echo "[$(date +%T)] DEP :: {{ ns }}/{{ _name }} -> rollout status ({{ rollout_timeout_seconds }}s)";
      if ! oc rollout status "deploy/{{ _name }}" -n "{{ ns }}" --watch --timeout="{{ rollout_timeout_seconds }}s"; then
        echo "{{ ns }};deploy;{{ _name }};timeout" >> "{{ _timeouts_file }}";
      fi

      rsn="$(oc -n "{{ ns }}" get rs -o jsonpath='{range .items[?(@.metadata.ownerReferences[0].kind=="Deployment" && @.metadata.ownerReferences[0].name=="{{ _name }}")]}{.metadata.name}{"\n"}{end}' | tail -n1 || true)"
      if [ -z "$rsn" ]; then
        rsn="$(oc -n "{{ ns }}" get rs -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep -E "{{ _name }}" | tail -n1 || true)"
      fi

      if [ -n "$rsn" ]; then
        rs="rs/$rsn"
        oc -n "{{ ns }}" label "$rs" 'ansible.mca/restarted-by=ansible' --overwrite
        oc -n "{{ ns }}" label "$rs" "{{ _exec_label }}" --overwrite
      else
        echo "[$(date +%T)] DEP :: {{ ns }}/{{ _name }} -> WARN: não foi possível resolver o RS para rotular."
      fi
    } >> "{{ _log }}" 2>&1
  args: { executable: /bin/bash }
  register: dp_roll
  changed_when: true
  failed_when: false
