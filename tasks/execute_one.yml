---
- name: Determine object identifiers
  ansible.builtin.set_fact:
    _type: "{{ obj.type | default('') }}"
    _name: "{{ obj.name | default('') }}"

- name: Sanity check – object has type and name
  ansible.builtin.assert:
    that:
      - _name | length > 0
      - (_type | length > 0) or (restart_strategy in ['auto','bounce_scale','dc_rollout_latest','deploy_rollout_restart'])
    fail_msg: "Objeto inválido: faltando type/name. Recebido: {{ obj | to_nice_json }}"

- name: Prepare KUBECONFIG for shell commands
  ansible.builtin.set_fact:
    _kcfg: "{{ lookup('env','KUBECONFIG') | default(paths.kubeconfig | default(''), true) }}"

- name: Get current replicas for zero-check (dc first, fallback to deploy)
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ _kcfg }}"
    ns="{{ ns }}"; name="{{ _name }}"; t="{{ _type }}"
    if [ "$t" = "dc" ]; then
      oc -n "$ns" get dc "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo ""
      exit 0
    fi
    if [ "$t" = "deploy" ]; then
      oc -n "$ns" get deploy "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo ""
      exit 0
    fi
    oc -n "$ns" get dc "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || \
    oc -n "$ns" get deploy "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo ""
  args:
    executable: /bin/bash
  register: _repcheck
  changed_when: false
  failed_when: false

- name: Normalize replicas number (int; empty -> -1)
  ansible.builtin.set_fact:
    _replicas: >-
      {{
        (_repcheck.stdout | default('') | trim) |
        default('', true) |
        ternary( (_repcheck.stdout | default('') | trim) | int, -1 )
      }}

- name: Skip object when replicas == 0 (track on report)
  when: _replicas | int == 0
  block:
    - name: Add to current-zero list (memory)
      ansible.builtin.set_fact:
        lista_currentzero: >-
          {{
            (lista_currentzero | default([]))
            + [ {
                'namespace': ns,
                'kind': (_type | default('auto')),
                'name': _name,
                'reason': 'replicas=0'
              } ]
          }}

    - name: Append to sync skipfile (only in sync mode)
      when: (run_mode | default('sync')) == 'sync'
      ansible.builtin.lineinfile:
        path: "{{ _skip_sync }}"
        line: "{{ ns }};{{ (_type | default('auto')) }};{{ _name }};replicas=0"
        create: true

    - name: Append log (zero replicas)
      ansible.builtin.shell: |
        set -euo pipefail
        echo "[$(date +%T)] SKIP {{ (_type | default('auto')) | upper }} {{ ns }}/{{ _name }} (replicas=0)" >> "{{ log_file }}"
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Stop further tasks for this object (noop)
      ansible.builtin.meta: noop

- name: Restart object (strategy auto/dc/deploy/bounce)
  when: _replicas | int != 0
  ansible.builtin.include_tasks: restart_object.yml
