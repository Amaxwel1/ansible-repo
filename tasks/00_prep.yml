---
- name: Freeze tmpdir to avoid re-rendering with a different job_id
  ansible.builtin.set_fact:
    tmpdir: >-
      {{
        (paths is defined and paths.tmpdir is defined and (paths.tmpdir | trim) != '')
        | ternary(paths.tmpdir, '/tmp/ocp-restart-' ~ (job_id | default('noid')))
      }}
    cacheable: false

- name: Ensure temp dir
  ansible.builtin.file:
    path: "{{ tmpdir }}"
    state: directory
    mode: "0755"

- name: Define runtime files (scoped to tmpdir)
  ansible.builtin.set_fact:
    log_file: "{{ tmpdir }}/rollout-{{ job_id }}.log"
    skipfile_async: "{{ tmpdir }}/skipped-async-{{ job_id }}.csv"
    report_file: "{{ tmpdir }}/report.html"

- name: Ensure log and skipfile exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: touch
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - { path: "{{ log_file }}", mode: "0644" }
    - { path: "{{ skipfile_async }}", mode: "0644" }

- name: Save OCP password to temp file (if provided)
  when: ocp_password | length > 0
  ansible.builtin.copy:
    dest: "{{ tmpdir }}/ocp-password"
    mode: "0600"
    content: "{{ ocp_password }}"

- name: Compose label list and exclude NS pattern
  vars:
    _labels: "{{ (labels | trim) | default('', true) }}"
    _exns: "{{ (exclude_namespaces | trim) | default('', true) }}"
  ansible.builtin.set_fact:
    label_list: "{{ (_labels|length>0) | ternary(_labels.split(','), []) | map('trim') | list }}"
    exclude_ns_pattern: >-
      {{
        (_exns|length>0)
        | ternary(_exns.split(',') | map('trim') | join('|'), omit)
      }}

- name: Init include/exclude maps
  ansible.builtin.set_fact:
    include_map: {}
    exclude_map: {}
    __inc_friendly_raw: ""
    __exc_friendly_raw: ""

- name: Load include/exclude from dict (include_objects/exclude_objects)
  when: include_objects is mapping or exclude_objects is mapping
  ansible.builtin.set_fact:
    include_map: "{{ (include_objects is mapping) | ternary(include_objects, include_map) }}"
    exclude_map: "{{ (exclude_objects is mapping) | ternary(exclude_objects, exclude_map) }}"

- name: Classificar include/exclude strings
  vars:
    _inc_str: "{{ include_objects | default('', true) | trim }}"
    _exc_str: "{{ exclude_objects | default('', true) | trim }}"
  ansible.builtin.set_fact:
    __inc_is_structured: "{{ (_inc_str is string) and (_inc_str | regex_search('^\\s*[\\{\\[]')) }}"
    __exc_is_structured: "{{ (_exc_str is string) and (_exc_str | regex_search('^\\s*[\\{\\[]')) }}"
    __inc_str_val: "{{ _inc_str }}"
    __exc_str_val: "{{ _exc_str }}"

- name: Parse include/exclude from YAML/JSON string (somente quando estruturado)
  when: (__inc_is_structured | bool) or (__exc_is_structured | bool)
  ansible.builtin.set_fact:
    include_map: >-
      {{
        (__inc_is_structured | bool)
          | ternary( include_map | combine( (__inc_str_val | from_yaml) , recursive=True ),
                     include_map )
      }}
    exclude_map: >-
      {{
        (__exc_is_structured | bool)
          | ternary( exclude_map | combine( (__exc_str_val | from_yaml) , recursive=True ),
                     exclude_map )
      }}

- name: Guardar raw amigável de include/exclude
  ansible.builtin.set_fact:
    __inc_friendly_raw: "{{ (__inc_is_structured | bool) | ternary('', __inc_str_val) }}"
    __exc_friendly_raw: "{{ (__exc_is_structured | bool) | ternary('', __exc_str_val) }}"

- name: Apply friendly entries to include_map
  vars:
    _raw: >-
      {{
        (
          (include_objects_text | default('')) ~ ',' ~
          (include_map if (include_map is string) else '') ~ ',' ~
          (__inc_friendly_raw | default(''))
        )
      }}
    _items: "{{ _raw.split(',') | map('trim') | reject('equalto','') | list }}"
    _ns: "{{ item | regex_replace('[:/].*$', '') | trim }}"
    _obj: "{{ item | regex_replace('^[^:/]+[:/]', '') | trim }}"
  when: _raw | trim | length > 0
  ansible.builtin.set_fact:
    include_map: "{{ include_map | combine({ _ns: ((include_map[_ns] | default([])) + [ _obj ]) }, recursive=True) }}"
  loop: "{{ _items }}"

- name: Apply friendly entries to exclude_map
  vars:
    _raw: >-
      {{
        (
          (exclude_objects_text | default('')) ~ ',' ~
          (exclude_map if (exclude_map is string) else '') ~ ',' ~
          (__exc_friendly_raw | default(''))
        )
      }}
    _items: "{{ _raw.split(',') | map('trim') | reject('equalto','') | list }}"
    _ns: "{{ item | regex_replace('[:/].*$', '') | trim }}"
    _obj: "{{ item | regex_replace('^[^:/]+[:/]', '') | trim }}"
  when: _raw | trim | length > 0
  ansible.builtin.set_fact:
    exclude_map: "{{ exclude_map | combine({ _ns: ((exclude_map[_ns] | default([])) + [ _obj ]) }, recursive=True) }}"
  loop: "{{ _items }}"

- name: Validar dicts
  ansible.builtin.assert:
    that:
      - include_map is mapping
      - exclude_map is mapping
    fail_msg: >
      include_map/exclude_map precisam ser dicts no formato {namespace: [objetos]}.
      Exemplos:
        include_objects_text: "demo-dil:flask-api, demo-bil:nginx-web"
        (ou) include_objects: {"demo-dil": ["flask-api", "postgres"]}

- name: Mark start time
  ansible.builtin.command: date +"%d/%m/%Y %H:%M:%S"
  register: start_time
  changed_when: false

- name: Mark start epoch
  ansible.builtin.command: date +%s
  register: start_epoch
  changed_when: false

- name: Detect executor user
  ansible.builtin.set_fact:
    executor_user: >-
      {{
        awx_user_name | default(tower_user_name | default(lookup('env','AWX_USER')
        | default(lookup('env','USER') | default(ocp_user | default('ansible')))))
      }}

- name: Touch rollout log file
  ansible.builtin.file:
    path: "{{ log_file }}"
    state: touch
    mode: "0644"

- name: Init lists for reporting
  ansible.builtin.set_fact:
    lista_currentzero: []
    ns_timings: []
