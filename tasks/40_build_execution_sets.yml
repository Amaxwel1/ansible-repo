---
- name: Load ordered files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/group_namespaces_order"
    patterns: "*.yml"
  register: order_files

- name: Normalize aplication_scope (groups) to a list
  ansible.builtin.set_fact:
    __scope_list: >-
      {{
        (aplication_scope is sequence and (aplication_scope is not string))
          | ternary(
              (aplication_scope | list),
              (
                (aplication_scope | default('ALL') | string | trim)
                  | regex_replace('[;\n]', ',')
                  | split(',')
                  | map('trim')
                  | reject('equalto','')
                  | list
              )
            )
      }}

- name: Normalize aplication_scope (groups)
  ansible.builtin.set_fact:
    __scope_all: >-
      {{
        (__scope_list | map('lower') | list | length == 0)
        or ('all' in (__scope_list | map('lower') | list))
      }}

- name: Filter order files by selected groups (survey)
  ansible.builtin.set_fact:
    __order_files_filtered: >-
      {{
        (order_files.files | default([]))
          if __scope_all
          else
            (
              order_files.files
              | selectattr('path','search','(?i)(' ~ (__scope_list | join('|')) ~ ')')
              | list
            )
      }}

- name: Init ordered chunks
  ansible.builtin.set_fact:
    __ordered_chunks: []

- name: Read one ordered file (raw YAML)
  vars:
    _raw: "{{ lookup('file', item.path) }}"
    _data: "{{ _raw | from_yaml }}"
    _list: >-
      {{
        (_data if _data is sequence else
         (_data.order  if (_data is mapping and 'order'  in _data) else
          (_data.ordens if (_data is mapping and 'ordens' in _data) else
           (_data.items  if (_data is mapping and 'items'  in _data) else []))))
      }}
  ansible.builtin.set_fact:
    __ordered_chunks: "{{ __ordered_chunks + (_list | list) }}"
  loop: "{{ __order_files_filtered | default([]) }}"
  when: (__order_files_filtered | default([])) | length > 0

- name: Validate ordered entries shape
  when: (__ordered_chunks | length) > 0
  ansible.builtin.assert:
    that:
      - __ordered_chunks is sequence
      - (__ordered_chunks | selectattr('namespace','defined') | list | length) == (__ordered_chunks | length)
    fail_msg: >
      Cada item pode ser:
      {namespace: <ns>, objects: [{type: dc|deploy, name: <obj>}, ...]}
      OU simplesmente:
      {namespace: <ns>}.
      Verifique os arquivos em group_namespaces_order/.

- name: Coletar todos os objetos ordenados
  ansible.builtin.set_fact:
    _ord_all: "{{ __ordered_chunks }}"

- name: Build order_dict (from ordered files)
  when: (_ord_all | length) > 0
  ansible.builtin.set_fact:
    order_dict: "{{ (order_dict | default({})) | combine({ item.namespace: (item.objects | default([])) }, recursive=True) }}"
  loop: "{{ _ord_all | default([]) }}"

- name: Seed ns_sync from order files (when present)
  when: (_ord_all | length) > 0
  ansible.builtin.set_fact:
    ns_sync: "{{ _ord_all | default([]) }}"
    __has_order_files: true

- name: "Fallback: init ns_sync when order files absent/empty"
  when: (_ord_all | length) == 0
  ansible.builtin.set_fact:
    ns_sync: []
    __has_order_files: false

- name: "Fallback: build ns_sync from ns_objects (dc first, then deploy)"
  when: (__has_order_files | default(false)) == false
  vars:
    _ns_entry_yaml: |
      namespace: {{ item.key }}
      objects:
      {% for n in (item.value.dc | default([])) %}
        - type: dc
          name: {{ n }}
      {% endfor %}
      {% for n in (item.value.deploy | default([])) %}
        - type: deploy
          name: {{ n }}
      {% endfor %}
  ansible.builtin.set_fact:
    ns_sync: "{{ ns_sync + [ (_ns_entry_yaml | from_yaml) ] }}"
  loop: "{{ ns_objects | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Build allowed (dc/deploy) per namespace
  ansible.builtin.set_fact:
    _allowed_dc: {}
    _allowed_deploy: {}

- name: Fill allowed_dc
  ansible.builtin.set_fact:
    _allowed_dc: "{{ _allowed_dc | combine({ item.key: (item.value.dc | default([])) }) }}"
  loop: "{{ ns_objects | dict2items }}"

- name: Fill allowed_deploy
  ansible.builtin.set_fact:
    _allowed_deploy: "{{ _allowed_deploy | combine({ item.key: (item.value.deploy | default([])) }) }}"
  loop: "{{ ns_objects | dict2items }}"

- name: Init filtered ns_sync
  ansible.builtin.set_fact:
    ns_sync_filtered: []

- name: Filter ns_sync by allowed lists (dc/deploy)
  vars:
    _ns: "{{ item.namespace }}"
    _dc_allowed: "{{ _allowed_dc.get(_ns, []) }}"
    _dp_allowed: "{{ _allowed_deploy.get(_ns, []) }}"
    _objs: "{{ item.objects | default([]) }}"
    _explicit_objs: "{{ (item.objects is defined) and ((_objs | length) > 0) }}"
    _kept_dc: >-
      {{
        _objs
        | selectattr('type','equalto','dc')
        | selectattr('name','in', _dc_allowed)
        | list
      }}
    _kept_dp: >-
      {{
        _objs
        | selectattr('type','equalto','deploy')
        | selectattr('name','in', _dp_allowed)
        | list
      }}
    _kept_objs: "{{ _kept_dc + _kept_dp }}"
  ansible.builtin.set_fact:
    ns_sync_filtered: >-
      {{
        ns_sync_filtered
        +
        (
          (
            (_kept_objs | length) > 0
          )
          |
          ternary(
            [ {'namespace': _ns, 'objects': _kept_objs} ],
            (
              (not _explicit_objs)
              | ternary(
                  [ {'namespace': _ns, 'objects': []} ],
                  []
                )
            )
          )
        )
      }}
  loop: "{{ ns_sync | default([]) }}"
  loop_control:
    label: "{{ item.namespace }}"

- name: Init order dropped log
  ansible.builtin.set_fact:
    order_dropped_log: []

- name: Append order dropped items into log
  vars:
    _ns: "{{ item.namespace }}"
    _dc_allowed: "{{ _allowed_dc.get(_ns, []) }}"
    _dp_allowed: "{{ _allowed_deploy.get(_ns, []) }}"
    _objs: "{{ item.objects | default([]) }}"
    _drop_dc: >-
      {{
        _objs
        | selectattr('type','equalto','dc')
        | rejectattr('name','in', _dc_allowed)
        | list
      }}
    _drop_dp: >-
      {{
        _objs
        | selectattr('type','equalto','deploy')
        | rejectattr('name','in', _dp_allowed)
        | list
      }}
    _dropped: "{{ _drop_dc + _drop_dp }}"
  ansible.builtin.set_fact:
    order_dropped_log: "{{ order_dropped_log + (_dropped | map('combine', {'namespace': _ns}) | list) }}"
  loop: "{{ ns_sync | default([]) }}"
  loop_control:
    label: "{{ item.namespace }}"

- name: Final ns_sync (filtered)
  ansible.builtin.set_fact:
    ns_sync: "{{ ns_sync_filtered }}"

- name: Build discovery namespace list
  ansible.builtin.set_fact:
    _all_discovery_ns: "{{ ns_objects | dict2items | map(attribute='key') | list | unique }}"

- name: Build sync namespace name list
  ansible.builtin.set_fact:
    _ns_sync_names: "{{ ns_sync | map(attribute='namespace') | list | unique }}"

- name: Build async-from-discovery list (excluding sync)
  ansible.builtin.set_fact:
    _ns_async_from_discovery: "{{ _all_discovery_ns | difference(_ns_sync_names) }}"

- name: Pick ns_sync entries without explicit objects
  ansible.builtin.set_fact:
    _ns_sync_noobjs: >-
      {{
        (
          (ns_sync | default([]))
          | selectattr('namespace','defined')
          | selectattr('namespace','string')
          | selectattr('namespace','truthy')
          | selectattr('objects','undefined')
          | map(attribute='namespace') | list
        )
        +
        (
          (ns_sync | default([]))
          | selectattr('objects','defined')
          | selectattr('objects','equalto',[])
          | map(attribute='namespace') | list
        )
      }}

- name: Normalize force_async_namespaces
  ansible.builtin.set_fact:
    _force_async_list: >-
      {{
        (force_async_namespaces | default([]))
        | map('string') | map('trim') | reject('equalto','') | list | unique
      }}

- name: Decide which namespaces go async (by toggle/list)
  ansible.builtin.set_fact:
    _ns_to_async: >-
      {{
        (empty_sync_namespaces_go_async | default(true) | bool)
          | ternary(
              (_ns_sync_noobjs | unique),
              (_ns_sync_noobjs | select('in', _force_async_list) | list | unique)
            )
      }}

- name: Remove moved namespaces from ns_sync
  when: (_ns_to_async | length) > 0
  ansible.builtin.set_fact:
    ns_sync: >-
      {{
        (ns_sync | default([]))
        | rejectattr('namespace','in', _ns_to_async) | list
      }}

- name: Assemble async namespace order (moved first, then discovery)
  ansible.builtin.set_fact:
    _ns_async_order: >-
      {{
        (_ns_to_async | default([]))
        +
        ((_ns_async_from_discovery | default([])) | difference(_ns_to_async | default([])))
      }}

- name: Init ns_async dict
  ansible.builtin.set_fact:
    ns_async: {}

- name: Fill ns_async respecting assembled order
  ansible.builtin.set_fact:
    ns_async: >-
      {{
        ns_async
        | combine(
            {
              item: {
                'dc':     (ns_objects.get(item, {}).get('dc', [])     | default([])),
                'deploy': (ns_objects.get(item, {}).get('deploy', []) | default([]))
              }
            },
            recursive=True
          )
      }}
  loop: "{{ _ns_async_order | default([]) }}"
  loop_control:
    label: "{{ item }}"

- name: Init execution plan & async aggregator
  ansible.builtin.set_fact:
    execution_plan: []
    ns_async_all: {}

- name: Append steps per ordered item (preserves interleaving)
  ansible.builtin.include_tasks: 41_plan_per_item.yml
  loop: "{{ __ordered_chunks | default([]) }}"
  loop_control:
    loop_var: nsdef
    label: "{{ nsdef.namespace }}"

- name: Collect namespaces already scheduled as async
  ansible.builtin.set_fact:
    __plan_async_ns: >-
      {{
        execution_plan
        | selectattr('mode','equalto','async')
        | map(attribute='ns_async_map')
        | map('dict2items')
        | list
        | sum(start=[])
        | map(attribute='key')
        | list
        | unique
      }}

- name: Final async for leftover namespaces
  vars:
    _left_map: >-
      {{
        (ns_async | default({}))
        | dict2items
        | rejectattr('key', 'in', __plan_async_ns)
        | list
        | items2dict
      }}
  when: (_left_map | length) > 0
  ansible.builtin.set_fact:
    execution_plan: "{{ execution_plan + [ { 'mode': 'async', 'ns_async_map': _left_map } ] }}"

- name: Finalize global ns_async for reporting
  ansible.builtin.set_fact:
    ns_async: "{{ (ns_async | default({})) | combine(ns_async_all | default({}), recursive=True) }}"
