---
- name: Mark end time
  ansible.builtin.command: date +"%d/%m/%Y %H:%M:%S"
  register: end_time
  changed_when: false

- name: Compute execution time seconds
  ansible.builtin.set_fact:
    _dur_secs: >-
      {{
        (
          (end_time.stdout   | to_datetime('%d/%m/%Y %H:%M:%S')) -
          (start_time.stdout | to_datetime('%d/%m/%Y %H:%M:%S'))
        ).total_seconds() | int
      }}

- name: Format execution_time as HH:MM:SS
  ansible.builtin.set_fact:
    execution_time: >-
      {%- set s = _dur_secs | int -%}
      {{ "%02d:%02d:%02d" | format(((s//3600)%100), ((s%3600)//60), (s%60)) }}

- name: Normalize metrics structures
  ansible.builtin.set_fact:
    _namespaces: "{{ namespaces | default([]) }}"
    _ns_sync: "{{ ns_sync  | default([]) }}"
    _ns_async: "{{ ns_async | default({}) }}"
    _ns_objects: "{{ ns_objects | default({}) }}"
    _async_sum: "{{ _async_summary | default([]) }}"
    _notfound: "{{ lista_notfound | default([]) }}"
    _currentzero: "{{ lista_currentzero | default([]) }}"
    _ns_timings: "{{ ns_timings | default([]) }}"
    _log_file: "{{ log_file | default(tmpdir ~ '/ocp-restart-' ~ (job_id | default('noid')) ~ '.log') }}"
    _skip_sync: "{{ skipfile_sync  | default(tmpdir ~ '/skip-sync.csv') }}"
    _skip_async: "{{ skipfile_async | default(tmpdir ~ '/skip-async.csv') }}"

- name: Derive sync/async namespace name lists
  ansible.builtin.set_fact:
    _ns_sync_names: >-
      {{
        (_ns_sync | default([]))
        | selectattr('namespace','defined')
        | map(attribute='namespace') | list
      }}
    _ns_async_names: >-
      {{
        (_ns_async | default({})).keys() | list
      }}

- name: Derive effective namespaces executed
  ansible.builtin.set_fact:
    _namespaces_effective: "{{ ((_ns_sync_names | default([])) + (_ns_async_names | default([]))) | unique }}"

- name: Normalize async results list
  ansible.builtin.set_fact:
    _async_results: >-
      {{
        (async_final.results
         if (async_final is defined and async_final.results is defined)
         else [])
      }}

- name: Count sync targets by kind
  vars:
    _objs: "{{ _ns_sync | map(attribute='objects') | list | flatten }}"
  ansible.builtin.set_fact:
    sync_dc_total: "{{ (_objs | selectattr('type','equalto','dc')      | list | length) | int }}"
    sync_deploy_total: "{{ (_objs | selectattr('type','equalto','deploy')  | list | length) | int }}"

- name: Count async targets by kind
  vars:
    _dc: "{{ _ns_async.values() | map(attribute='dc')     | list | flatten | default([]) }}"
    _dp: "{{ _ns_async.values() | map(attribute='deploy') | list | flatten | default([]) }}"
  ansible.builtin.set_fact:
    async_dc_total: "{{ (_dc | length) | int }}"
    async_deploy_total: "{{ (_dp | length) | int }}"

- name: Read skipfiles robustly and convert to YAML rows
  ansible.builtin.shell: |
    set -euo pipefail
    out=""
    for f in {{ _skip_sync | quote }} {{ _skip_async | quote }}; do
      [ -f "$f" ] || continue
      while IFS= read -r line || [ -n "$line" ]; do
        l="${line%$'\r'}"
        [ -z "$l" ] && continue
        case "$l" in \#*) continue ;; esac
        IFS=';' read -r ns kind name reason <<< "$l"
        : "${reason:=replicas=0}"
        reason="${reason//\"/\\\"}"
        ns="${ns//\"/\\\"}"; kind="${kind//\"/\\\"}"; name="${name//\"/\\\"}"
        printf -- "- {namespace: \"%s\", kind: \"%s\", name: \"%s\", reason: \"%s\"}\n" \
          "$ns" "$kind" "$name" "$reason"
      done < "$f"
    done
  args:
    executable: /bin/bash
  register: _skips_yaml
  changed_when: false

- name: Load skipped objects YAML
  ansible.builtin.set_fact:
    _currentzero: >-
      {{
        (_skips_yaml.stdout | default('') | trim | length > 0)
          | ternary((_skips_yaml.stdout | from_yaml), [])
      }}

- name: Init requested filters accumulators
  ansible.builtin.set_fact:
    include_requested_map: []
    include_requested_str: []
    exclude_requested_map: []
    exclude_requested_str: []
    ns_excluded_requested: []

- name: Parse exclude_namespaces (requested)
  vars:
    _exc_ns_raw: "{{ (exclude_namespaces | default('', true) | trim) }}"
  ansible.builtin.set_fact:
    ns_excluded_requested: >-
      {{
        (_exc_ns_raw | length > 0)
          | ternary(
              _exc_ns_raw.split(',') | map('trim') | reject('equalto','') | list,
              []
            )
      }}

- name: Build include_requested_str from string
  when: include_objects is string
  vars:
    _inc_str: "{{ include_objects | default('', true) | trim }}"
  ansible.builtin.set_fact:
    include_requested_str: >-
      {{
        (_inc_str | length > 0)
          | ternary(
              (_inc_str | split(',') | map('trim') | reject('equalto','') | list),
              []
            )
      }}

- name: Normalize include_objects to mapping (safe)
  ansible.builtin.set_fact:
    _inc_map_safe: "{{ include_objects if (include_objects is mapping) else {} }}"

- name: Build include_requested_map as ns:obj (from mapping)
  vars:
    _vals: >-
      {{
        (item.value
          if (item.value is sequence and (item.value is not string))
          else [ item.value ])
        | map('string') | map('trim') | reject('equalto','') | list
      }}
    _pairs: "{{ _vals | map('regex_replace','^(.*)$', item.key ~ ':\\1') | list }}"
  ansible.builtin.set_fact:
    include_requested_map: "{{ include_requested_map + _pairs }}"
  loop: "{{ _inc_map_safe | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Build exclude_requested_str from string
  when: exclude_objects is string
  vars:
    _exc_str: "{{ exclude_objects | default('', true) | trim }}"
  ansible.builtin.set_fact:
    exclude_requested_str: >-
      {{
        (_exc_str | length > 0)
          | ternary(
              (_exc_str | split(',') | map('trim') | reject('equalto','') | list),
              []
            )
      }}

- name: Normalize exclude_objects to mapping (safe)
  ansible.builtin.set_fact:
    _exc_map_safe: "{{ exclude_objects if (exclude_objects is mapping) else {} }}"

- name: Build exclude_requested_map as ns:obj (from mapping)
  vars:
    _vals: >-
      {{
        (item.value
          if (item.value is sequence and (item.value is not string))
          else [ item.value ])
        | map('string') | map('trim') | reject('equalto','') | list
      }}
    _pairs: "{{ _vals | map('regex_replace','^(.*)$', item.key ~ ':\\1') | list }}"
  ansible.builtin.set_fact:
    exclude_requested_map: "{{ exclude_requested_map + _pairs }}"
  loop: "{{ _exc_map_safe | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Merge requested filters (final)
  ansible.builtin.set_fact:
    include_requested: "{{ (include_requested_map | default([])) + (include_requested_str | default([])) }}"
    exclude_requested: "{{ (exclude_requested_map | default([])) + (exclude_requested_str | default([])) }}"

- name: Init derived lists
  ansible.builtin.set_fact:
    requested_in_excluded_ns: []
    derived_notfound: []

- name: Classify include requests against exclusions and discovery
  vars:
    _req: "{{ item }}"
    _ns: "{{ _req.split(':', 1)[0] | trim if ':' in _req else _req }}"
    _obj: "{{ _req.split(':', 1)[1] | trim if ':' in _req else '' }}"
    _present_dc: "{{ (_ns_objects.get(_ns, {}).get('dc', []) | select('equalto', _obj) | list | length) > 0 }}"
    _present_dp: "{{ (_ns_objects.get(_ns, {}).get('deploy', []) | select('equalto', _obj) | list | length) > 0 }}"
  ansible.builtin.set_fact:
    requested_in_excluded_ns: >-
      {{
        requested_in_excluded_ns
        +
        ([{'namespace': _ns, 'object': _obj}] if (_ns in ns_excluded_requested) else [])
      }}
    derived_notfound: >-
      {{
        derived_notfound
        +
        ([{'namespace': _ns, 'object': _obj}] if (not (_ns in ns_excluded_requested) and not _present_dc and not _present_dp and (_obj | length > 0)) else [])
      }}
  loop: "{{ include_requested | default([]) }}"

- name: Compute formatted async timings per result (shell, no extra filters)
  vars:
    _ns: >-
      {{
        (item.item is string)
          | ternary(item.item, (item.item.item | default('')))
      }}
    _start_raw: "{{ item.start | default('') }}"
    _end_raw: "{{ item.end   | default('') }}"
  ansible.builtin.shell: |
    set -euo pipefail
    st="{{ _start_raw }}"; en="{{ _end_raw }}"
    st="${st%%.*}"; en="${en%%.*}"
    sf="—"; ef="—"; dur="—"
    if [ -n "$st" ]; then sf="$(date -d "$st" +'%d/%m/%Y %H:%M:%S' 2>/dev/null || echo '—'); fi
    if [ -n "$en" ]; then ef="$(date -d "$en" +'%d/%m/%Y %H:%M:%S' 2>/dev/null || echo '—'); fi
    if [ -n "$st" ] && [ -n "$en" ]; then
      ss="$(date -d "$st" +%s 2>/dev/null || echo '')"
      ee="$(date -d "$en" +%s 2>/dev/null || echo '')"
      if [ -n "$ss" ] && [ -n "$ee" ]; then
        dd=$((ee-ss))
        printf '%s|%s|%02d:%02d:%02d\n' "$sf" "$ef" $(((dd/3600)%100)) $(((dd%3600)/60)) $((dd%60))
        exit 0
      fi
    fi
    printf '%s|%s|%s\n' "$sf" "$ef" "{{ item.delta | default('—') }}"
  args:
    executable: /bin/bash
  register: _async_fmt
  loop: "{{ _async_results }}"
  loop_control:
    label: "{{ (item.item is string) | ternary(item.item, (item.item.item | default(''))) }}"
  when: _async_results | length > 0

- name: Append async timings to ns_timings (normalized)
  vars:
    _ns: >-
      {{
        (item.item is string)
          | ternary(item.item, (item.item.item | default('')))
      }}
    _fmt: "{{ _async_fmt.results[loop.index0] }}"
    _parts: "{{ (_fmt.stdout | default('—|—|—')).split('|') }}"
    _start_fmt: "{{ _parts[0] | default('—') }}"
    _end_fmt: "{{ _parts[1] | default('—') }}"
    _dur_fmt: "{{ _parts[2] | default('—') }}"
  ansible.builtin.set_fact:
    ns_timings: >-
      {{
        (ns_timings | default([]))
        + [ { 'namespace': _ns, 'mode': 'async', 'start': _start_fmt, 'end': _end_fmt, 'duration': _dur_fmt } ]
      }}
  loop: "{{ async_final.results | default([]) }}"
  loop_control:
    label: "{{ (item.item is string) | ternary(item.item, (item.item.item | default(''))) }}"
  when: (_start_fmt != '—') or (_end_fmt != '—') or (_dur_fmt not in ['—', '', '0:00:00', '00:00:00'])

- name: Filter timings used in report (remove empty rows)
  ansible.builtin.set_fact:
    ns_timings_clean: >-
      {{
        (ns_timings | default([]))
        | selectattr('duration', 'defined')
        | rejectattr('duration', 'in', ['—', '', '0:00:00', '00:00:00'])
        | list
      }}

- name: Stat rollout log file
  ansible.builtin.stat:
    path: "{{ _log_file }}"
  register: _log_stat

- name: Slurp rollout log
  ansible.builtin.slurp:
    path: "{{ _log_file }}"
  when: _log_stat.stat.exists
  register: _log_slurp

- name: Stat issues file (timeouts_async.log)
  ansible.builtin.stat:
    path: "{{ tmpdir }}/timeouts_async.log"
  register: _issues_stat

- name: Slurp issues file
  when: _issues_stat.stat.exists
  ansible.builtin.slurp:
    path: "{{ tmpdir }}/timeouts_async.log"
  register: _issues_slurp

- name: Build issues text
  when: _issues_stat.stat.exists
  ansible.builtin.set_fact:
    _issues_text: "{{ (_issues_slurp.content | default('') | b64decode) }}"

- name: Build issues lines list
  when: _issues_stat.stat.exists
  ansible.builtin.set_fact:
    _issues_lines: "{{ _issues_text.splitlines() | select('truthy') | list }}"
    timeouts_by_ns: "{{ timeouts_by_ns | default([]) }}"

- name: Parse issues (timeout/erro) para lista de dicts
  when:
    - _issues_stat.stat.exists
    - "(((line | string).split(';')) | length) >= 3"
  ansible.builtin.set_fact:
    timeouts_by_ns: "{{ timeouts_by_ns + [ {
      'namespace': ((line | string).split(';'))[0] | default('—'),
      'kind':      ((line | string).split(';'))[1] | default('—'),
      'name':      ((line | string).split(';'))[2] | default('—'),
      'message':   ((((line | string).split(';')) | length) > 3) | ternary(((line | string).split(';'))[3], '—')
      } ] }}"
  loop: "{{ _issues_lines }}"
  loop_control:
    loop_var: line

- name: Add parsed issues into summary
  when: _issues_stat.stat.exists
  ansible.builtin.set_fact:
    summary: "{{ (summary | default({})) | combine(
      {'timeouts_by_ns': (timeouts_by_ns | default([]))},
      recursive=True
      ) }}"

- name: Parse async timeouts lines
  when: _log_stat.stat.exists
  vars:
    _txt: "{{ (_log_slurp.content | default('')) | b64decode }}"
    _lines: "{{ _txt.splitlines() }}"
  ansible.builtin.set_fact:
    timeouts_list: >-
      {{
        _lines
          | select('search','Timed out waiting for the condition')
          | list
          | map('regex_search','\\[(\\d{2}:\\d{2}:\\d{2})\\].*(dc|DEP)\\s*::\\s*([^/]+)/([^ ]+).*','\\1;\\2;\\3;\\4')
          | map('split',';')
          | selectattr('length','==',4)
          | map('list')
          | map('extract', 0) | list
          | zip(
              _lines | select('search','Timed out waiting for the condition') | list
                     | map('regex_search','\\[(\\d{2}:\\d{2}:\\d{2})\\].*(dc|DEP)\\s*::\\s*([^/]+)/([^ ]+).*','\\2') | list,
              _lines | select('search','Timed out waiting for the condition') | list
                     | map('regex_search','\\[(\\d{2}:\\d{2}:\\d{2})\\].*(dc|DEP)\\s*::\\s*([^/]+)/([^ ]+).*','\\3') | list,
              _lines | select('search','Timed out waiting for the condition') | list
                     | map('regex_search','\\[(\\d{2}:\\d{2}:\\d{2})\\].*(dc|DEP)\\s*::\\s*([^/]+)/([^ ]+).*','\\4') | list
            )
          | map('list')
          | map('first')
          | list
          | map('combine', [{'time':''}])
      }}

- name: Normalize aplication_scope to a sequence
  ansible.builtin.set_fact:
    _appl_scope_seq: >-
      {{
        (aplication_scope is sequence and (aplication_scope is not string))
          | ternary(
              (aplication_scope | list),
              (
                ((aplication_scope | default('ALL') | string | trim) | length == 0)
                  | ternary(
                      ['ALL'],
                      (
                        ((aplication_scope | string | trim | upper) == 'ALL')
                          | ternary(
                              ['ALL'],
                              (
                                aplication_scope
                                | string | trim
                                | regex_replace('[;\n]', ',')
                                | split(',')
                                | map('trim')
                                | reject('equalto','')
                                | list
                              )
                            )
                      )
                    )
              )
            )
      }}

- name: Derive chosen groups text for report
  ansible.builtin.set_fact:
    chosen_groups_text: >-
      {%- set has_label = (labels | default('') | string | trim | length > 0) -%}
      {%- set only_all  = (_appl_scope_seq | length == 1 and (_appl_scope_seq[0] | upper) == 'ALL') -%}
      {%- if has_label and (only_all) -%}
        Todos
      {%- elif only_all -%}
        Todos
      {%- else -%}
        {{ _appl_scope_seq | map('string') | map('upper') | list | join(', ') }}
      {%- endif -%}

- name: Collect executed sync namespaces
  ansible.builtin.set_fact:
    _ns_sync_names: >-
      {{
        (ns_sync | default([]))
        | selectattr('objects','defined')
        | selectattr('objects','truthy')
        | map(attribute='namespace') | list | unique
      }}

- name: Collect executed async namespaces
  ansible.builtin.set_fact:
    _ns_async_names: >-
      {{
        (ns_async | default({}))
        | dict2items
        | selectattr('value','defined')
        | selectattr('value','string','equalto','__no__') | list 
      }}
  when: false

- name: Compute executed async namespaces (real)
  ansible.builtin.set_fact:
    _ns_async_names: >-
      {{
        (ns_async | default({}))
        | dict2items
        | selectattr('value','defined')
        | selectattr('value','map') | list
        | selectattr('value.dc','defined') | list + []
      }}
  when: false

- name: Compute executed async namespaces (final)
  ansible.builtin.set_fact:
    _ns_async_names: >-
      {{
        (ns_async | default({}))
        | dict2items
        | selectattr('value','defined')
        | selectattr('value','typeof','dict')
        | selectattr('value','truthy')
        | selectattr('value','map') | list 
        | map('extract','key') | list
        |
        # reconstroi checando len(dc)+len(deploy)
        list
      }}
  when: false

- name: Compute executed async namespaces (explicit, robust)
  vars:
    _pairs: "{{ (ns_async | default({})) | dict2items }}"
    _kept: >-
      {%- set keep = [] -%}
      {%- for it in _pairs -%}
        {%- set _dc = (it.value.dc | default([])) -%}
        {%- set _dp = (it.value.deploy | default([])) -%}
        {%- if (_dc | length + _dp | length) > 0 -%}
          {%- set _ = keep.append(it.key) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ keep }}
  ansible.builtin.set_fact:
    _ns_async_names: "{{ _kept }}"

- name: Derive effective namespaces executed
  ansible.builtin.set_fact:
    _effective_namespaces: "{{ (_ns_sync_names | default([])) + (_ns_async_names | default([])) | unique }}"

- name: Compose consolidated summary
  ansible.builtin.set_fact:
    summary:
      start: "{{ start_time.stdout }}"
      end: "{{ end_time.stdout }}"
      execution_time: "{{ execution_time }}"
      namespaces_total: "{{ _effective_namespaces | length }}"
      ns_sync_total: "{{ _ns_sync | length }}"
      ns_async_total: "{{ _ns_async | length }}"
      sync_dc_total: "{{ sync_dc_total }}"
      sync_deploy_total: "{{ sync_deploy_total }}"
      async_dc_total: "{{ async_dc_total }}"
      async_deploy_total: "{{ async_deploy_total }}"
      namespaces: "{{ _effective_namespaces }}"
      ns_sync: "{{ _ns_sync }}"
      ns_async: "{{ _ns_async }}"
      ns_objects: "{{ _ns_objects }}"
      async_summary: "{{ _async_sum }}"
      currentzero: "{{ _currentzero }}"
      ns_timings: "{{ _ns_timings }}"
      ns_excluded_requested: "{{ ns_excluded_requested | default([]) }}"
      include_requested: "{{ include_requested | default([]) }}"
      exclude_requested: "{{ exclude_requested | default([]) }}"
      requested_in_excluded_ns: "{{ requested_in_excluded_ns | default([]) }}"
      notfound: "{{ derived_notfound | default([]) }}"
      timeouts: "{{ timeouts_list | default([]) }}"
      timeouts_by_ns: "{{ timeouts_by_ns | default([]) }}"
      chosen_groups_text: "{{ chosen_groups_text }}"

- name: Build ns_async_effective map (only namespaces with real objects)
  vars:
    _items: "{{ (summary.ns_async | default({})) | dict2items }}"
  ansible.builtin.set_fact:
    _ns_async_effective: >-
      {%- set acc = _ns_async_effective | default({}) -%}
      {%- for it in _items -%}
        {%- set v = it.value -%}
        {%- if v is mapping -%}
          {%- set dc = v.dc | default([]) -%}
          {%- set dp = v.deploy | default([]) -%}
          {%- if (dc | length + dp | length) > 0 -%}
            {%- set _ = acc.update({ it.key: v }) -%}
          {%- endif -%}
        {%- elif v is sequence and (v is not string) -%}
          {%- if (v | length) > 0 -%}
            {%- set _ = acc.update({ it.key: v }) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ acc }}

- name: Count async targets by kind (effective only)
  vars:
    _vals: "{{ (_ns_async_effective | default({})).values() | list }}"
  ansible.builtin.set_fact:
    async_dc_total_effective: >-
      {{
        ( _vals | select('mapping') | map(attribute='dc')     | list | flatten | default([]) | length ) | int
      }}
    async_deploy_total_effective: >-
      {{
        ( _vals | select('mapping') | map(attribute='deploy') | list | flatten | default([]) | length ) | int
      }}
    ns_async_total_effective: "{{ (_ns_async_effective | default({})) | length }}"

- name: Update summary with effective async view
  ansible.builtin.set_fact:
    summary: "{{ summary | combine({
      'ns_async_effective': _ns_async_effective | default({}),
      'ns_async_total_effective': ns_async_total_effective | default(0),
      'async_dc_total_effective': async_dc_total_effective | default(0),
      'async_deploy_total_effective': async_deploy_total_effective | default(0),
      'namespaces_total': (summary.ns_sync_total | int) + (ns_async_total_effective | int)
      }, recursive=True) }}"

- name: Normalize only_these_namespaces to list (report scope)
  ansible.builtin.set_fact:
    _only_ns_list: >-
      {{
        (
          only_these_namespaces
          if (only_these_namespaces is sequence and (only_these_namespaces is not string))
          else (
            (only_these_namespaces | default('') | string | trim)
              | regex_replace('[;\n]', ',')
              | split(',')
              | map('trim')
              | reject('equalto','')
              | list
          )
        )
        | default([])
      }}

- name: Detect label presence
  ansible.builtin.set_fact:
    _has_label: "{{ (labels | default('') | string | trim | length) > 0 }}"

- name: Compute flags used in sync reporting
  ansible.builtin.set_fact:
    _has_only_ns: "{{ ((_only_ns_list | default([])) | length) > 0 }}"

- name: Decide if report should restrict to namespaces with targets
  ansible.builtin.set_fact:
    _restrict_report: "{{ (_has_label | default(false)) or ((_only_ns_list | length) > 0) }}"

- name: Build sync namespace names (all)
  ansible.builtin.set_fact:
    _ns_sync_names_all: >-
      {{ (summary.ns_sync | default([])) | map(attribute='namespace') | list | unique }}

- name: Build sync namespace names with effective targets (entry.objects OR ns_objects)
  vars:
    _ns_from_entries: >-
      {{
        (summary.ns_sync | default([]))
        | selectattr('objects','defined')
        | selectattr('objects','truthy')
        | map(attribute='namespace') | list | unique
      }}
    _ns_from_ns_objects: >-
      {%- set acc = [] -%}
      {%- for ns, v in (summary.ns_objects | default({})).items() -%}
        {%- set dc = v.dc | default([]) -%}
        {%- set dp = v.deploy | default([]) -%}
        {%- if (dc | length + dp | length) > 0 -%}
          {%- set _ = acc.append(ns) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ acc | unique }}
  ansible.builtin.set_fact:
    _ns_sync_names_with_objs: "{{ (_ns_from_entries + _ns_from_ns_objects) | unique }}"

- name: Decide sync namespace names to show (respect only_these_namespaces first)
  ansible.builtin.set_fact:
    _ns_sync_report_names: >-
      {{
        _has_only_ns
          | ternary(
              (_ns_sync_names_all | select('in', _only_ns_list) | list | unique),
              (
                (_has_label | default(false))
                  | ternary(_ns_sync_names_with_objs, _ns_sync_names_all)
              )
            )
      }}

- name: Build async namespace names for header
  ansible.builtin.set_fact:
    _ns_async_report_names: >-
      {{ (summary.ns_async_effective | default({})) | dict2items | map(attribute='key') | list | unique }}

- name: Build final namespaces list for report
  ansible.builtin.set_fact:
    _namespaces_report: "{{ (_ns_sync_report_names + _ns_async_report_names) | unique }}"

- name: Compute counts for header (namespaces_total and ns_sync_total)
  ansible.builtin.set_fact:
    _namespaces_total_hdr: "{{ _namespaces_report | length }}"
    _ns_sync_total_hdr: "{{ _ns_sync_report_names | length }}"

- name: Filter summary.ns_timings to report namespaces
  ansible.builtin.set_fact:
    _ns_timings_filtered: >-
      {{
        (summary.ns_timings | default([]))
        | selectattr('namespace','in', _namespaces_report)
        | list
      }}

- name: Update summary with header namespace list and counts
  ansible.builtin.set_fact:
    summary: "{{ summary | combine({
      'namespaces': _namespaces_report,
      'namespaces_total': _namespaces_total_hdr,
      'ns_sync_total': _ns_sync_total_hdr,
      'ns_timings': _ns_timings_filtered
      }, recursive=True) }}"

- name: Override summary.ns_sync for sequential table when restricted
  when: _restrict_report | bool
  ansible.builtin.set_fact:
    summary: "{{ summary | combine({
      'ns_sync': (summary.ns_sync | default([])) | selectattr('namespace','in', _ns_sync_report_names) | list
      }, recursive=True) }}"

- name: Enrich ns_sync entries with effective objects for report
  ansible.builtin.set_fact:
    _ns_sync_enriched: >-
      {%- set acc = [] -%}
      {%- for e in (summary.ns_sync | default([])) -%}
        {%- set ns = e.namespace -%}
        {%- set objs = e.objects | default([]) -%}
        {%- if (objs | length) == 0 -%}
          {%- set dc_list = summary.ns_objects.get(ns, {}).get('dc', []) -%}
          {%- set dp_list = summary.ns_objects.get(ns, {}).get('deploy', []) -%}
          {%- set dc = (dc_list
                        | map('regex_replace','^(.*)$','{"type":"dc","name":"\\1"}')
                        | map('from_yaml') | list) -%}
          {%- set dp = (dp_list
                        | map('regex_replace','^(.*)$','{"type":"deploy","name":"\\1"}')
                        | map('from_yaml') | list) -%}
          {%- set objs2 = dc + dp -%}
        {%- else -%}
          {%- set objs2 = objs -%}
        {%- endif -%}
        {%- set _ = acc.append({'namespace': ns, 'objects': objs2}) -%}
      {%- endfor -%}
      {{ acc }}

- name: Filter enriched ns_sync by selected namespaces (when restricted)
  when: _restrict_report | bool
  ansible.builtin.set_fact:
    _ns_sync_enriched: "{{ _ns_sync_enriched | selectattr('namespace','in', _ns_sync_report_names) | list }}"

- name: Update summary.ns_sync with enriched list for the sequential table
  ansible.builtin.set_fact:
    summary: "{{ summary | combine({'ns_sync': _ns_sync_enriched}, recursive=True) }}"

- name: Recount sync targets (from enriched list) for the header 'Alvos (Sequencial)'
  vars:
    _objs_enr: "{{ _ns_sync_enriched | map(attribute='objects') | list | flatten }}"
  ansible.builtin.set_fact:
    summary: "{{ summary | combine({
      'sync_dc_total': (_objs_enr | selectattr('type','equalto','dc')     | list | length) | int,
      'sync_deploy_total': (_objs_enr | selectattr('type','equalto','deploy') | list | length) | int
      }, recursive=True) }}"
