---
- name: Prepare KUBECONFIG/log/skip/timeout
  ansible.builtin.set_fact:
    _kcfg: "{{ lookup('env','KUBECONFIG') | default(paths.kubeconfig | default(''), true) }}"
    _log: "{{ log_file }}"
    _skipf: "{{ skipfile_async }}"
    _timeoutf: "{{ timeout_file | default(tmpdir ~ '/timeouts_async.log') }}"
    _exec_label: "ansible.restart/by={{ (executor_user | string) | replace(' ', '_') | lower }}"

- name: Preview async objects per namespace (debug)
  vars:
    ns_async_name: "{{ item }}"
    objs_async: "{{ ns_async[ns_async_name] | default({}) }}"
  ansible.builtin.debug:
    msg:
      ns: "{{ ns_async_name }}"
      dc: "{{ objs_async.dc | default([]) }}"
      deploy: "{{ objs_async.deploy | default([]) }}"
  loop: "{{ batch_list }}"

- name: Start async shells per namespace (one job per ns)
  vars:
    ns_async_name: "{{ item }}"
    objs_async: "{{ ns_async[ns_async_name] | default({}) }}"
    dc_list: "{{ (objs_async.dc | default([])) | list }}"
    dp_list: "{{ (objs_async.deploy | default([])) | list }}"
    obj_parallel: "{{ [ (_async_objects_per_namespace | default(async_objects_per_namespace | default(1)) | int), 1 ] | max }}"
    strategy_name: "{{ restart_strategy | default('auto') }}"
    script: |
      set -eo pipefail
      export KUBECONFIG="{{ _kcfg }}"
      ns="{{ ns_async_name }}"
      to="{{ rollout_timeout_seconds | int }}"
      tozero="{{ scale_bounce_wait_zero | int }}"
      objpar="{{ obj_parallel }}"
      strategy="{{ strategy_name }}"
      LOG="{{ _log }}"
      SKIPF="{{ _skipf }}"
      TIMEOUTF="{{ _timeoutf }}"
      EXECLABEL="{{ _exec_label }}"

      [ -n "${objpar:-}" ] || objpar=1
      if [ "$objpar" -lt 1 ] 2>/dev/null; then
        objpar=1
      fi

      num_or_zero() {
        case "${1:-}" in
          ''|*[!0-9]*) echo 0 ;;
          *) echo "$1" ;;
        esac
      }

      wait_ready_count() {
        local kind="$1"
        local name="$2"
        local target="$3"
        local timeout="$4"
        local mode="$5"
        local elapsed=0
        local cur=""

        while [ "$elapsed" -lt "$timeout" ]; do
          cur="$(oc -n "$ns" get "$kind" "$name" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo '')"
          cur="$(num_or_zero "$cur")"

          if [ "$mode" = "zero" ]; then
            [ "$cur" -eq 0 ] && return 0
          else
            [ "$cur" -ge "$target" ] && return 0
          fi

          sleep 5
          elapsed=$((elapsed + 5))
        done

        return 1
      }

      label_rc_of_dc() {
        local name="$1"
        local rc
        rc="$(oc -n "$ns" get rc \
              -l "openshift.io/deployment-config.name=$name" \
              --sort-by=.metadata.creationTimestamp \
              -o name 2>/dev/null | tail -n1 || true)"
        [ -n "$rc" ] || return 0
        oc -n "$ns" label "$rc" "ansible.mca/restarted-by=ansible" --overwrite || true
        oc -n "$ns" label "$rc" "$EXECLABEL" --overwrite || true
      }

      label_rs_of_deploy() {
        local name="$1"
        local rs
        rs="$(oc -n "$ns" get rs \
              --sort-by=.metadata.creationTimestamp \
              -o custom-columns=NAME:.metadata.name,OWNER:.metadata.ownerReferences[0].name \
              --no-headers 2>/dev/null \
              | awk -v d="$name" '$2==d{last=$1} END{print last}')"
        if [ -z "$rs" ]; then
          local rev
          rev="$(oc -n "$ns" get deploy "$name" -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || true)"
          if [ -n "$rev" ]; then
            rs="$(oc -n "$ns" get rs \
                  --sort-by=.metadata.creationTimestamp \
                  -o custom-columns=NAME:.metadata.name,OWNER:.metadata.ownerReferences[0].name,REV:.metadata.annotations.deployment\\.kubernetes\\.io/revision \
                  --no-headers 2>/dev/null \
                  | awk -v d="$name" -v r="$rev" '$2==d && $3==r{last=$1} END{print last}')"
          fi
        fi
        [ -n "$rs" ] || return 0
        oc -n "$ns" label "rs/$rs" "ansible.mca/restarted-by=ansible" --overwrite || true
        oc -n "$ns" label "rs/$rs" "$EXECLABEL" --overwrite || true
      }

      restart_one() {
        local kind="$1"
        local name="$2"
        local reps=""

        if [ "$kind" = "dc" ]; then
          reps="$(oc -n "$ns" get dc "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo '')"
          reps="$(num_or_zero "$reps")"

          if [ "$reps" -eq 0 ]; then
            echo "$ns;dc;$name;replicas=0" >> "$SKIPF"
            echo "[$(date +%T)] SKIP DC  $ns/$name (replicas=0)" >> "$LOG"
            return 0
          fi

          if [ "$strategy" = "bounce_scale" ]; then
            {
              echo "[$(date +%T)] BOUNCE :: dc $ns/$name -> scale down to 0"
              if ! oc -n "$ns" scale "dc/$name" --replicas=0; then
                echo "$ns;dc;$name;scale_down_failed" >> "$TIMEOUTF"
                return 0
              fi

              echo "[$(date +%T)] BOUNCE :: dc $ns/$name -> wait readyReplicas=0 (${tozero}s)"
              if ! wait_ready_count "dc" "$name" 0 "$tozero" zero; then
                echo "$ns;dc;$name;bounce_zero_timeout" >> "$TIMEOUTF"
              fi

              echo "[$(date +%T)] BOUNCE :: dc $ns/$name -> scale up to $reps"
              if ! oc -n "$ns" scale "dc/$name" --replicas="$reps"; then
                echo "$ns;dc;$name;scale_up_failed" >> "$TIMEOUTF"
                return 0
              fi

              echo "[$(date +%T)] BOUNCE :: dc $ns/$name -> wait readyReplicas>=$reps (${to}s)"
              if ! wait_ready_count "dc" "$name" "$reps" "$to" up; then
                echo "$ns;dc;$name;bounce_up_timeout" >> "$TIMEOUTF"
              fi

              label_rc_of_dc "$name" || true
            } >> "$LOG" 2>&1
            return 0
          fi

          {
            echo "[$(date +%T)] DC  :: $ns/$name -> rollout latest"
            if ! oc -n "$ns" rollout latest "dc/$name"; then
              echo "$ns;dc;$name;rollout_start_failed" >> "$TIMEOUTF"
            else
              echo "[$(date +%T)] DC  :: $ns/$name -> rollout status (${to}s)"
              if ! oc -n "$ns" rollout status "dc/$name" --watch --timeout="${to}s"; then
                echo "$ns;dc;$name;timeout" >> "$TIMEOUTF"
              fi
              label_rc_of_dc "$name" || true
            fi
          } >> "$LOG" 2>&1

          return 0
        fi

        reps="$(oc -n "$ns" get deploy "$name" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo '')"
        reps="$(num_or_zero "$reps")"

        if [ "$reps" -eq 0 ]; then
          echo "$ns;deploy;$name;replicas=0" >> "$SKIPF"
          echo "[$(date +%T)] SKIP DEP $ns/$name (replicas=0)" >> "$LOG"
          return 0
        fi

        if [ "$strategy" = "bounce_scale" ]; then
          {
            echo "[$(date +%T)] BOUNCE :: deploy $ns/$name -> scale down to 0"
            if ! oc -n "$ns" scale "deploy/$name" --replicas=0; then
              echo "$ns;deploy;$name;scale_down_failed" >> "$TIMEOUTF"
              return 0
            fi

            echo "[$(date +%T)] BOUNCE :: deploy $ns/$name -> wait readyReplicas=0 (${tozero}s)"
            if ! wait_ready_count "deploy" "$name" 0 "$tozero" zero; then
              echo "$ns;deploy;$name;bounce_zero_timeout" >> "$TIMEOUTF"
            fi

            echo "[$(date +%T)] BOUNCE :: deploy $ns/$name -> scale up to $reps"
            if ! oc -n "$ns" scale "deploy/$name" --replicas="$reps"; then
              echo "$ns;deploy;$name;scale_up_failed" >> "$TIMEOUTF"
              return 0
            fi

            echo "[$(date +%T)] BOUNCE :: deploy $ns/$name -> wait readyReplicas>=$reps (${to}s)"
            if ! wait_ready_count "deploy" "$name" "$reps" "$to" up; then
              echo "$ns;deploy;$name;bounce_up_timeout" >> "$TIMEOUTF"
            fi

            label_rs_of_deploy "$name" || true
          } >> "$LOG" 2>&1
          return 0
        fi

        {
          echo "[$(date +%T)] DEP :: $ns/$name -> rollout restart"
          if ! oc -n "$ns" rollout restart "deploy/$name"; then
            echo "$ns;deploy;$name;rollout_start_failed" >> "$TIMEOUTF"
          else
            echo "[$(date +%T)] DEP :: $ns/$name -> rollout status (${to}s)"
            if ! oc -n "$ns" rollout status "deploy/$name" --watch --timeout="${to}s"; then
              echo "$ns;deploy;$name;timeout" >> "$TIMEOUTF"
            fi
            label_rs_of_deploy "$name" || true
          fi
        } >> "$LOG" 2>&1

        return 0
      }

      run_chunk() {
        local item kind name
        local pids=()

        for item in "$@"; do
          kind="${item%%:*}"
          name="${item#*:}"
          restart_one "$kind" "$name" &
          pids+=("$!")
        done

        local pid
        for pid in "${pids[@]}"; do
          wait "$pid" || true
        done
      }

      OBJECTS=(
      {% for name in dc_list %}
        "dc:{{ name }}"
      {% endfor %}
      {% for name in dp_list %}
        "deploy:{{ name }}"
      {% endfor %}
      )

      total="{{ (dc_list | length) + (dp_list | length) }}"
      if [ "$total" -eq 0 ]; then
        echo "[$(date +%T)] Namespace $ns sem objetos async." >> "$LOG"
        exit 0
      fi

      idx=0
      while [ "$idx" -lt "$total" ]; do
        chunk=( "${OBJECTS[@]:$idx:$objpar}" )
        echo "[$(date +%T)] Namespace $ns -> lote interno async de até $objpar objetos" >> "$LOG"
        run_chunk "${chunk[@]}"
        idx=$((idx + objpar))
      done

      echo "[$(date +%T)] Namespace $ns finalizado." >> "$LOG"
      exit 0
  ansible.builtin.shell: "{{ script }}"
  args:
    executable: /bin/bash
  async: "{{ max_async_seconds }}"
  poll: 0
  loop: "{{ batch_list }}"
  register: async_jobs

- name: Wait for async batch to complete
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: async_poll
  until: (async_poll.finished | default(false)) | bool
  retries: "{{ _async_retries }}"
  delay: "{{ _async_delay }}"
  failed_when: false
  loop: "{{ async_jobs.results }}"

- name: Collect final results (per namespace)
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  register: async_final
  failed_when: false
  loop: "{{ async_jobs.results }}"

- name: Append ns timings (async) – formatted
  vars:
    _ns_name: >-
      {{
        (item.item is string)
          | ternary(item.item, (item.item.item | default('')))
      }}
    _start_raw: "{{ item.start | default('') }}"
    _end_raw: "{{ item.end   | default('') }}"
    _delta_raw: "{{ item.delta | default('') }}"
    _start_iso: "{{ (_start_raw | length > 0) | ternary(_start_raw.split('.')[0], '') }}"
    _end_iso: "{{ (_end_raw   | length > 0) | ternary(_end_raw.split('.')[0],   '') }}"
    _start_show: >-
      {{
        (_start_iso | length > 0)
          | ternary(
              (_start_iso | regex_replace('^(\\d{4})-(\\d{2})-(\\d{2}) (\\d{2}:\\d{2}:\\d{2})$','\\3/\\2/\\1 \\4')),
              '—'
            )
      }}
    _end_show: >-
      {{
        (_end_iso | length > 0)
          | ternary(
              (_end_iso | regex_replace('^(\\d{4})-(\\d{2})-(\\d{2}) (\\d{2}:\\d{2}:\\d{2})$','\\3/\\2/\\1 \\4')),
              '—'
            )
      }}
    _dur_clean: "{{ (_delta_raw | string).split('.')[0] if (_delta_raw | length > 0) else '—' }}"
    _dur_show: "{{ _dur_clean | regex_replace('^(\\d):','0\\1:') if _dur_clean != '—' else '—' }}"
  ansible.builtin.set_fact:
    ns_timings: >-
      {{
        (ns_timings | default([])) + [{
          'namespace': _ns_name,
          'mode': 'async',
          'start': _start_show,
          'end': _end_show,
          'duration': _dur_show
        }]
      }}
  loop: "{{ async_final.results }}"

- name: Build async summary
  ansible.builtin.set_fact:
    _async_summary: "{{ (_async_summary | default([])) + [ {
      'namespace': (item.item is string) | ternary(item.item, (item.item.item | default(''))),
      'jid':       (item.jid | default(item.ansible_job_id | default(''))),
      'rc':        (item.rc  | default('')),
      'stdout':    (item.stdout | default('')),
      'stderr':    (item.stderr | default(''))
      } ] }}"
  loop: "{{ async_final.results }}"

- name: Debug async summary (optional)
  ansible.builtin.debug:
    var: _async_summary
