---
- name: Definir timeout/poll de reciclagem do DDS-Stream
  ansible.builtin.set_fact:
    dds_pod_start_timeout_seconds: "{{ dds_pod_start_timeout_seconds | default(50) | int }}"
    dds_pod_poll_interval_seconds: "{{ dds_pod_poll_interval_seconds | default(5) | int }}"
  changed_when: false

- name: Descobrir pod do DDS-Stream (TH)
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_th }}"
    api_version: v1
    kind: Pod
    namespace: "{{ dds_namespace }}"
    label_selectors:
      - "deploymentconfig={{ dds_dc_name }}"
  register: dds_pods

- name: Selecionar pod running atual do DDS-Stream
  ansible.builtin.set_fact:
    dds_stream_pod: >-
      {{
        (
          dds_pods.resources | default([])
          | selectattr('status.phase', 'equalto', 'Running')
          | list
        )[0].metadata.name
        | default(omit)
      }}
  changed_when: false

- name: Guardar pod antigo do DDS-Stream
  ansible.builtin.set_fact:
    dds_old_pod: "{{ dds_stream_pod }}"
  changed_when: false

- name: Deletar pod atual do DDS-Stream antes dos testes
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ dds_namespace }}" delete pod "{{ dds_old_pod }}" --wait=false
  register: dds_delete_pod
  changed_when: true
  args:
    executable: /bin/bash

- name: Aguardar pod antigo do DDS-Stream sumir
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ dds_namespace }}" get pod "{{ dds_old_pod }}" >/dev/null 2>&1
  register: dds_old_pod_check
  retries: "{{ ((dds_pod_start_timeout_seconds | int) // (dds_pod_poll_interval_seconds | int)) | int }}"
  delay: "{{ dds_pod_poll_interval_seconds | int }}"
  until: dds_old_pod_check.rc != 0
  changed_when: false
  failed_when: false
  args:
    executable: /bin/bash

- name: Descobrir novo pod do DDS-Stream
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ dds_namespace }}" get pods \
      -l deploymentconfig="{{ dds_dc_name }}" \
      --sort-by=.metadata.creationTimestamp \
      -o jsonpath='{.items[-1:].metadata.name}'
  register: dds_new_pod_name
  retries: "{{ ((dds_pod_start_timeout_seconds | int) // (dds_pod_poll_interval_seconds | int)) | int }}"
  delay: "{{ dds_pod_poll_interval_seconds | int }}"
  until:
    - dds_new_pod_name.rc == 0
    - (dds_new_pod_name.stdout | default('') | trim) != ''
    - (dds_new_pod_name.stdout | trim) != (dds_old_pod | trim)
  changed_when: false
  args:
    executable: /bin/bash

- name: Atualizar dds_stream_pod para o novo pod
  ansible.builtin.set_fact:
    dds_stream_pod: "{{ dds_new_pod_name.stdout | trim }}"
  changed_when: false

- name: Aguardar novo pod do DDS-Stream ficar Running
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ dds_namespace }}" get pod "{{ dds_stream_pod }}" -o jsonpath='{.status.phase}'
  register: dds_pod_phase
  retries: "{{ ((dds_pod_start_timeout_seconds | int) // (dds_pod_poll_interval_seconds | int)) | int }}"
  delay: "{{ dds_pod_poll_interval_seconds | int }}"
  until:
    - dds_pod_phase.rc == 0
    - (dds_pod_phase.stdout | trim) == 'Running'
  changed_when: false
  args:
    executable: /bin/bash

- name: Executar testes de telnet no pod DDS
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ dds_namespace }}" exec "{{ dds_stream_pod }}" -- \
      sh -c '(echo | telnet {{ item.host }} {{ item.port }} || true)'
  loop: "{{ dds_telnet_tests }}"
  loop_control:
    label: "{{ item.name }}"
  register: dds_telnet_results
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash

- name: Montar lista de testes DDS (sempre registra, mesmo com falha)
  ansible.builtin.set_fact:
    dds_tests_list: "{{ dds_tests_list | default([]) + [ {
      'name': item.name,
      'host': item.host,
      'port': item.port,
      'rc': (dds_telnet_results.results[idx].rc | default(1)),
      'ok': ((dds_telnet_results.results[idx].rc | default(1)) == 0)
      } ] }}"
  loop: "{{ dds_telnet_tests | default([]) }}"
  loop_control:
    index_var: idx
  changed_when: false

- name: Executar 'list' via telnet dentro do pod DDS (porta 4010)
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ dds_namespace }}" exec "{{ dds_stream_pod }}" -- \
      sh -c '(echo list && sleep {{ dds_telnet_sleep | default(2) }}) | telnet 127.0.0.1 4010'
  register: dds_list
  failed_when: dds_list.rc not in [0, 1]
  changed_when: false
  args:
    executable: /bin/bash

- name: Debug bruto do LIST do DDS
  ansible.builtin.debug:
    var: dds_list.stdout_lines
  when: debug_dds_list | default(false)

- name: Inicializar lista de canais DDS
  ansible.builtin.set_fact:
    _dds_channels: []
  changed_when: false

- name: Extrair canais retornados pelo DDS-Stream
  ansible.builtin.set_fact:
    _dds_channels: >-
      {{
        _dds_channels
        + [ {
              "canal": (item.split()[0] | regex_search('[0-9]+')),
              "delta": (item.split()[-1] | int)
            } ]
      }}
  loop: "{{ dds_list.stdout_lines | default([]) | select('contains', 'PROCESSOR-CANAL') | list }}"
  changed_when: false

- name: Montar resumo DDS-Stream (pods + testes + canais)
  ansible.builtin.set_fact:
    inicio_dds_stream_report:
      namespace: "{{ dds_namespace }}"
      pod: "{{ dds_stream_pod | default('N/A') }}"
      tests: "{{ dds_tests_list | default([]) }}"
      channels: "{{ _dds_channels | default([]) }}"
      delta_threshold: "{{ dds_delta_threshold | default(30) }}"
  changed_when: false
