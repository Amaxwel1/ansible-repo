---
- name: Zerando acumuladores do Streams
  ansible.builtin.set_fact:
    streams_all_channels: []
    streams_channels: []
  changed_when: false

- name: Definir pod corrente de streams
  ansible.builtin.set_fact:
    streams_current_pod: "{{ streams_pod_item }}"
  changed_when: false

- name: Definir timeout/poll de reciclagem do pod de streams
  ansible.builtin.set_fact:
    streams_pod_start_timeout_seconds: "{{ streams_pod_start_timeout_seconds | default(50) | int }}"
    streams_pod_poll_interval_seconds: "{{ streams_pod_poll_interval_seconds | default(5) | int }}"
  changed_when: false

- name: Registrar pod atual antes da reciclagem
  ansible.builtin.set_fact:
    streams_old_pod: "{{ streams_current_pod }}"
  changed_when: false

- name: Deletar pod atual do Streams antes do start
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ streams_namespace }}" delete pod "{{ streams_old_pod }}" --wait=false
  register: streams_delete_pod
  changed_when: true
  args:
    executable: /bin/bash

- name: Aguardar pod antigo sumir
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ streams_namespace }}" get pod "{{ streams_old_pod }}" >/dev/null 2>&1
  register: streams_old_pod_check
  retries: "{{ ((streams_pod_start_timeout_seconds | int) // (streams_pod_poll_interval_seconds | int)) | int }}"
  delay: "{{ streams_pod_poll_interval_seconds | int }}"
  until: streams_old_pod_check.rc != 0
  changed_when: false
  failed_when: false
  args:
    executable: /bin/bash

- name: Encontrar novo pod running de streams
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    oc -n "{{ streams_namespace }}" get pods --no-headers | awk '
      $1 ~ /stream/ && $3 == "Running" { print $1 }
    ' | grep -v "^{{ streams_old_pod }}$" | tail -n 1
  register: streams_new_pod_name
  retries: "{{ ((streams_pod_start_timeout_seconds | int) // (streams_pod_poll_interval_seconds | int)) | int }}"
  delay: "{{ streams_pod_poll_interval_seconds | int }}"
  until:
    - streams_new_pod_name.rc == 0
    - (streams_new_pod_name.stdout | default('') | trim) != ''
  changed_when: false
  args:
    executable: /bin/bash

- name: Atualizar streams_current_pod para o novo pod
  ansible.builtin.set_fact:
    streams_current_pod: "{{ streams_new_pod_name.stdout | trim }}"
  changed_when: false

- name: Executar comando de start dentro do pod {{ streams_current_pod }}
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    NS="{{ streams_namespace }}"
    POD="{{ streams_current_pod }}"
    START_CMD="{{ streams_start_command | default('start') }}"

    START_TS="$(date +%s)"
    START_HUMAN="$(date '+%Y-%m-%d %H:%M:%S')"
    echo "__START_TS__=${START_TS}"
    echo "__START_HUMAN__=${START_HUMAN}"
    echo "__STATUS__=STARTING"

    set +e
    START_OUTPUT="$(oc -n "$NS" exec "$POD" -- sh -lc "pwd; $START_CMD" 2>&1)"
    RC=$?
    set -e

    END_TS="$(date +%s)"
    END_HUMAN="$(date '+%Y-%m-%d %H:%M:%S')"
    echo "__END_TS__=${END_TS}"
    echo "__END_HUMAN__=${END_HUMAN}"
    echo "__DURATION_SECONDS__=$(( END_TS - START_TS ))"

    echo "__START_OUTPUT_BEGIN__"
    printf '%s\n' "$START_OUTPUT"
    echo "__START_OUTPUT_END__"

    if [ "$RC" -eq 3 ]; then
      echo "__STATUS__=EXIT3_OK"
      exit 3
    elif [ "$RC" -eq 0 ]; then
      echo "__STATUS__=OK"
      exit 0
    else
      echo "__STATUS__=START_FAILED_RC_${RC}"
      exit "$RC"
    fi
  register: streams_start
  failed_when: streams_start.rc not in [0, 3]
  changed_when: false
  args:
    executable: /bin/bash

- name: Garantir ansible_date_time disponível (Streams)
  ansible.builtin.setup:
    gather_subset: ["!all", "!min", "date_time"]
  when: ansible_date_time is not defined

- name: Marcar horário de início do Streams (HH:MM)
  ansible.builtin.set_fact:
    streams_start_hhmm: "{{ (ansible_date_time.time | default(''))[0:5] }}"
    streams_telnet_endpoint: "{{ streams_telnet_host }}:{{ streams_telnet_port }}"
  changed_when: false

- name: Executar 'list' via telnet dentro do pod {{ streams_current_pod }}
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    NS="{{ streams_namespace }}"
    POD="{{ streams_current_pod }}"

    oc -n "$NS" exec "$POD" -- sh -c '(echo list && sleep {{ streams_telnet_sleep }}) | telnet {{ streams_telnet_host }} {{ streams_telnet_port }}'
  register: streams_list
  failed_when: streams_list.rc not in [0, 1]
  changed_when: false
  args:
    executable: /bin/bash

- name: Inicializar listas temporárias
  ansible.builtin.set_fact:
    _channels_all: []
    _channels_high_filtered: []
    _channels_synced: []
  changed_when: false

- name: Extrair todos os canais do output
  ansible.builtin.set_fact:
    _channels_all: >-
      {{
        _channels_all
        + [ {
              "canal": (item.split()[0] | regex_search('[0-9]+')),
              "delta": (item.split()[-1] | int)
            } ]
      }}
  loop: "{{ streams_list.stdout_lines | default([]) | select('contains', 'PROCESSOR-CANAL') | list }}"
  changed_when: false

- name: Filtrar canais sincronizados (DELTA <= limite)
  ansible.builtin.set_fact:
    _channels_synced: >-
      {{
        _channels_all
        | selectattr('delta', '<=', streams_delta_threshold | int)
        | list
      }}
  changed_when: false

- name: Filtrar canais com DELTA > limite
  ansible.builtin.set_fact:
    _channels_high_filtered: >-
      {{
        _channels_high_filtered + [ ch ]
      }}
  loop: "{{ _channels_all }}"
  loop_control:
    loop_var: ch
  when: ch.delta | int > streams_delta_threshold | int
  changed_when: false

- name: Acumular todos os canais de streams
  ansible.builtin.set_fact:
    streams_all_channels: >-
      {{
        streams_all_channels
        + [
            {
              "namespace": streams_namespace,
              "pod": streams_current_pod,
              "canal": ch['canal'],
              "delta": ch['delta']
            }
          ]
      }}
  loop: "{{ _channels_all }}"
  loop_control:
    loop_var: ch
  when: _channels_all | length > 0
  changed_when: false

- name: Acumular canais com DELTA alto
  ansible.builtin.set_fact:
    streams_channels: >-
      {{
        streams_channels
        + [
            {
              "namespace": streams_namespace,
              "pod": streams_current_pod,
              "canal": ch['canal'],
              "delta": ch['delta']
            }
          ]
      }}
  loop: "{{ _channels_high_filtered }}"
  loop_control:
    loop_var: ch
  when: _channels_high_filtered | length > 0
  changed_when: false

- name: Reiniciar canais com DELTA alto
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ kubeconfig_th }}"
    NS="{{ streams_namespace }}"
    POD="{{ streams_current_pod }}"

    oc -n "$NS" exec "$POD" -- sh -c '(echo restart {{ ch.canal }} && sleep {{ streams_telnet_sleep }}) | telnet {{ streams_telnet_host }} {{ streams_telnet_port }}'
  loop: "{{ _channels_high_filtered }}"
  loop_control:
    loop_var: ch
  when:
    - _channels_high_filtered | length > 0
    - streams_restart_on_high_delta | bool
  register: streams_restart
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash

- name: Consolidar report do Streams
  ansible.builtin.set_fact:
    inicio_streams_report:
      start_time: "{{ streams_start_hhmm | default('N/A') }}"
      telnet_endpoint: "{{ streams_telnet_endpoint | default('N/A') }}"
      delta_threshold: "{{ streams_delta_threshold | int }}"
      pod: "{{ streams_current_pod }}"
      namespace: "{{ streams_namespace }}"
      channels: "{{ streams_channels | default([]) }}"
      all_channels: "{{ streams_all_channels | default([]) }}"
      synced_channels: "{{ _channels_synced | map(attribute='canal') | list }}"
      synced_count: "{{ (_channels_synced | length) | int }}"
  changed_when: false
